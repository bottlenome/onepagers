<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IUT Lean 形式検証 — 証明依存グラフ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Hiragino Sans", "Noto Sans JP", -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0f172a; color: #e2e8f0; overflow: hidden;
  }
  #top {
    position: fixed; top: 0; left: 0; right: 0; height: 58px; z-index: 20;
    display: flex; align-items: center; gap: 1rem; padding: 0 1.1rem;
    background: rgba(15,23,42,0.92); border-bottom: 1px solid #1e293b;
    backdrop-filter: blur(6px);
  }
  #top h1 { font-size: 1.05rem; color: #f1f5f9; white-space: nowrap; }
  #top .sub { color: #94a3b8; font-size: 0.78rem; }
  #stats { margin-left: auto; font-size: 0.78rem; color: #7dd3fc; white-space: nowrap; }
  #stats b { color: #bbf7d0; }
  .btn {
    background: #1e293b; border: 1px solid #334155; color: #cbd5e1;
    padding: 0.32rem 0.7rem; border-radius: 8px; font-size: 0.78rem; cursor: pointer;
  }
  .btn:hover { border-color: #60a5fa; color: #fff; }
  .btn.accent { background: #0c2536; border-color: #0ea5e9; color: #7dd3fc; font-weight: 600; }
  #cy { position: fixed; top: 58px; left: 0; right: 0; bottom: 0; }
  /* legend */
  #legend {
    position: fixed; top: 70px; left: 12px; z-index: 15; width: 232px;
    background: rgba(30,41,59,0.93); border: 1px solid #334155; border-radius: 12px;
    padding: 0.8rem 0.9rem; font-size: 0.76rem; backdrop-filter: blur(6px);
  }
  #legend h2 { font-size: 0.82rem; color: #7dd3fc; margin-bottom: 0.55rem; }
  .lg { display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.55rem; cursor: pointer; }
  .lg .sw { width: 13px; height: 13px; border-radius: 3px; flex: none; }
  .lg .nm { flex: 1; color: #e2e8f0; }
  .lg .bar { height: 5px; border-radius: 3px; background: #334155; margin-top: 2px; overflow: hidden; }
  .lg .bar i { display: block; height: 100%; border-radius: 3px; }
  .lg .pc { color: #94a3b8; font-size: 0.68rem; }
  .lg.dim { opacity: 0.35; }
  #hint { margin-top: 0.4rem; color: #64748b; font-size: 0.68rem; line-height: 1.4; }
  /* side panel */
  #panel {
    position: fixed; top: 58px; right: 0; bottom: 0; width: 360px; z-index: 18;
    background: #0c1626; border-left: 1px solid #1e293b; padding: 1.1rem 1.2rem;
    overflow-y: auto; transform: translateX(100%); transition: transform 0.25s; }
  #panel.open { transform: translateX(0); }
  #panel .close { float: right; cursor: pointer; color: #64748b; font-size: 1.1rem; }
  #panel .close:hover { color: #fff; }
  #panel h3 { font-size: 1.15rem; color: #f1f5f9; margin-bottom: 0.2rem; word-break: break-word; }
  #panel .ms { font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.8rem; }
  .chip { display: inline-block; font-size: 0.72rem; padding: 0.15rem 0.6rem; border-radius: 999px; margin: 0.15rem 0.2rem 0.15rem 0; }
  .badge { display: inline-block; font-size: 0.72rem; padding: 0.18rem 0.6rem; border-radius: 999px; margin: 0.2rem 0.25rem 0.2rem 0; }
  .badge.green { background: #166534; color: #bbf7d0; }
  .badge.amber { background: #78350f; color: #fde68a; }
  .badge.slate { background: #334155; color: #cbd5e1; }
  #panel .summary { color: #cbd5e1; font-size: 0.9rem; line-height: 1.65; margin: 0.7rem 0; }
  #panel .sec { font-size: 0.74rem; color: #7dd3fc; text-transform: uppercase; letter-spacing: 0.04em; margin: 1rem 0 0.4rem; }
  #panel a { color: #38bdf8; text-decoration: none; font-size: 0.86rem; display: block; margin: 0.3rem 0; }
  #panel a:hover { text-decoration: underline; }
  #panel .dep { color: #94a3b8; font-size: 0.8rem; line-height: 1.7; }
  #panel .dep code { background: #1e293b; padding: 0.05rem 0.35rem; border-radius: 4px; color: #cbd5e1; cursor: pointer; }
  #err { position: fixed; inset: 0; display: none; place-items: center; text-align: center; padding: 2rem; }
  #err a { color: #38bdf8; }
  @media (max-width: 720px) {
    #legend { display: none; } #panel { width: 100%; } #top .sub { display: none; }
  }
</style>
</head>
<body>
<div id="top">
  <h1>IUT 系3.12 Lean 形式検証</h1>
  <span class="sub">証明依存グラフ</span>
  <button class="btn" id="expandAll">全展開</button>
  <button class="btn" id="collapseAll">柱に折りたたむ</button>
  <button class="btn" id="fit">全体表示</button>
  <span id="stats"></span>
  <a class="btn accent" href="report.html">詳細レポート →</a>
</div>

<div id="legend">
  <h2>柱（クリックで絞り込み）</h2>
  <div id="legendItems"></div>
  <div id="hint">ノード = Lean モジュール / 矢印 = import 依存。<br>柱をダブルクリックで展開・折りたたみ。ノードクリックで詳細。</div>
</div>

<div id="cy"></div>

<div id="panel">
  <span class="close" id="panelClose">✕</span>
  <div id="panelBody"></div>
</div>

<div id="err">
  <div>
    <p>グラフライブラリ(CDN)の読み込みに失敗しました。</p>
    <p style="margin-top:1rem"><a href="report.html">→ 詳細レポート(report.html)を開く</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/layout-base@2.0.1/layout-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cose-base@2.2.0/cose-base.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose@2.2.0/cytoscape-fcose.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-expand-collapse@4.1.1/cytoscape-expand-collapse.js"></script>
<script>
(async function () {
  if (typeof cytoscape === 'undefined') { document.getElementById('err').style.display = 'grid'; return; }
  try { cytoscape.use(window.cytoscapeFcose); } catch (e) {}

  let graph, meta;
  try {
    [graph, meta] = await Promise.all([
      fetch('graph.json').then(r => r.json()),
      fetch('graph-meta.json').then(r => r.json())
    ]);
  } catch (e) { document.getElementById('err').style.display = 'grid'; return; }

  const pillars = meta.pillars;
  const refMap = meta.refs || {};
  const modMeta = meta.modules || {};
  const nodeById = {}; graph.nodes.forEach(n => nodeById[n.id] = n);

  // headline stats
  document.getElementById('stats').innerHTML =
    `<b>${graph.module_count}</b> モジュール · 検証済み定理 <b>${graph.verified_theorem_total}</b> · ` +
    `choice-free <b>${graph.choice_free_count}</b> · sorry なし`;

  // ---- build cytoscape elements (compound: pillar parents + module children) ----
  const usedPillars = [...new Set(graph.nodes.map(n => n.pillar))];
  const els = [];
  usedPillars.forEach(code => {
    const p = pillars[code] || { label: code, color: '#475569' };
    els.push({ data: { id: 'P_' + code, label: p.label, isPillar: true, color: p.color } });
  });
  graph.nodes.forEach(n => {
    const sz = Math.max(20, Math.min(64, 18 + n.decl_count * 1.5));
    els.push({ data: {
      id: n.id, label: n.label, parent: 'P_' + n.pillar,
      pillar: n.pillar, color: (pillars[n.pillar] || {}).color || '#64748b',
      size: sz, capstone: !!(modMeta[n.id] && modMeta[n.id].is_capstone),
      hub: !!(modMeta[n.id] && modMeta[n.id].is_hub)
    }});
  });
  graph.edges.forEach(e => els.push({ data: { id: e.source + '__' + e.target, source: e.source, target: e.target } }));

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements: els,
    wheelSensitivity: 0.25,
    boxSelectionEnabled: false,
    style: [
      { selector: 'node', style: {
        'background-color': 'data(color)', 'label': 'data(label)',
        'width': 'data(size)', 'height': 'data(size)',
        'font-size': 7, 'color': '#cbd5e1', 'text-valign': 'bottom',
        'text-margin-y': 2, 'min-zoomed-font-size': 6,
        'border-width': 1, 'border-color': '#0f172a' } },
      { selector: 'node[?capstone]', style: {
        'border-width': 2.5, 'border-color': '#f1f5f9', 'font-size': 9, 'color': '#f1f5f9' } },
      { selector: 'node[?hub]', style: { 'border-width': 2, 'border-color': '#fde68a' } },
      { selector: '$node > node', style: {} },
      { selector: ':parent', style: {
        'background-color': 'data(color)', 'background-opacity': 0.08,
        'border-width': 1.5, 'border-color': 'data(color)', 'border-opacity': 0.5,
        'label': 'data(label)', 'text-valign': 'top', 'text-halign': 'center',
        'font-size': 13, 'font-weight': 'bold', 'color': 'data(color)',
        'text-margin-y': -4, 'shape': 'round-rectangle', 'padding': 14 } },
      { selector: 'edge', style: {
        'width': 0.8, 'line-color': '#334155', 'target-arrow-color': '#334155',
        'target-arrow-shape': 'triangle', 'arrow-scale': 0.6,
        'curve-style': 'bezier', 'opacity': 0.55 } },
      { selector: '.faded', style: { 'opacity': 0.08, 'text-opacity': 0.08 } },
      { selector: 'node.hl', style: { 'border-width': 3, 'border-color': '#38bdf8' } },
      { selector: 'edge.hl', style: { 'line-color': '#38bdf8', 'target-arrow-color': '#38bdf8', 'width': 1.6, 'opacity': 0.95 } }
    ]
  });

  const layoutOpts = { name: 'fcose', quality: 'default', animate: false,
    nodeSeparation: 75, idealEdgeLength: 60, nodeRepulsion: 6000, packComponents: true };

  let api = null;
  try {
    api = cy.expandCollapse({
      layoutBy: layoutOpts, fisheye: false, animate: true, animationDuration: 250,
      undoable: false, cueEnabled: true, expandCollapseCueSize: 10
    });
  } catch (e) {}

  cy.layout(layoutOpts).run();
  if (api) { setTimeout(() => { try { api.collapseAll(); cy.fit(null, 40); } catch (e) {} }, 120); }
  else { cy.fit(null, 40); }

  // ---- legend ----
  const legendItems = document.getElementById('legendItems');
  let activePillar = null;
  usedPillars.sort((a, b) => (a === 'core' ? -1 : b === 'core' ? 1 : a.localeCompare(b)));
  usedPillars.forEach(code => {
    const p = pillars[code] || { label: code, color: '#475569', progress_pct: 0, status: '' };
    const cnt = graph.nodes.filter(n => n.pillar === code).length;
    const row = document.createElement('div'); row.className = 'lg'; row.dataset.code = code;
    row.innerHTML =
      `<span class="sw" style="background:${p.color}"></span>` +
      `<span style="flex:1">` +
        `<span class="nm">${p.label} <span class="pc">(${cnt})</span></span>` +
        `<div class="bar"><i style="width:${p.progress_pct||0}%;background:${p.color}"></i></div>` +
        `<span class="pc">${p.status||''}</span>` +
      `</span>`;
    row.onclick = () => {
      activePillar = (activePillar === code) ? null : code;
      cy.batch(() => {
        cy.nodes().forEach(n => {
          if (n.isParent()) return;
          const on = !activePillar || n.data('pillar') === activePillar;
          n.toggleClass('faded', !on);
        });
        cy.edges().forEach(e => {
          const on = !activePillar || (e.source().data('pillar') === activePillar && e.target().data('pillar') === activePillar);
          e.toggleClass('faded', !on);
        });
      });
      document.querySelectorAll('.lg').forEach(l => l.classList.toggle('dim', activePillar && l.dataset.code !== activePillar));
    };
    legendItems.appendChild(row);
  });

  // ---- side panel ----
  const panel = document.getElementById('panel');
  const body = document.getElementById('panelBody');
  document.getElementById('panelClose').onclick = () => panel.classList.remove('open');

  function showNode(id) {
    const n = nodeById[id]; if (!n) return;
    const m = modMeta[id] || {};
    const p = pillars[n.pillar] || { label: n.pillar, color: '#64748b' };
    const summary = m.summary || n.title || n.label;
    const deps = graph.edges.filter(e => e.target === id).map(e => e.source);
    const dependents = graph.edges.filter(e => e.source === id).map(e => e.target);
    let refsHtml = '';
    (n.refs || []).forEach(t => {
      const r = refMap[t];
      if (!r) return;
      refsHtml += r.pdf
        ? `<a href="${r.pdf}" target="_blank">📄 ${r.label} ↗</a>`
        : `<div style="color:#94a3b8;font-size:0.82rem;margin:0.25rem 0">📚 ${r.label}</div>`;
    });
    body.innerHTML =
      `<h3>${n.label}${m.is_capstone ? ' ★' : ''}${m.is_hub ? ' ◆' : ''}</h3>` +
      `<div class="ms">${n.milestone ? n.milestone + ' · ' : ''}IUT/${n.label}.lean</div>` +
      `<span class="chip" style="background:${p.color}22;color:${p.color};border:1px solid ${p.color}66">${p.label}</span>` +
      `<div class="summary">${summary}</div>` +
      (n.choice_free ? `<span class="badge green">選択公理不使用</span>` : `<span class="badge slate">標準公理</span>`) +
      (n.has_honest_scope ? `<span class="badge amber">正直申告あり（未形式化部分明記）</span>` : '') +
      `<span class="badge slate">宣言数 ${n.decl_count}</span>` +
      `<div class="sec">Lean ソース</div>` +
      `<a href="${n.github_url}" target="_blank">⌁ GitHub で IUT/${n.label}.lean を開く ↗</a>` +
      (refsHtml ? `<div class="sec">文献</div>${refsHtml}` : '') +
      (deps.length ? `<div class="sec">依存（import）${deps.length}</div><div class="dep">${deps.map(d => `<code data-id="${d}">${d}</code>`).join(' ')}</div>` : '') +
      (dependents.length ? `<div class="sec">被依存 ${dependents.length}</div><div class="dep">${dependents.map(d => `<code data-id="${d}">${d}</code>`).join(' ')}</div>` : '');
    body.querySelectorAll('code[data-id]').forEach(c => c.onclick = () => focusNode(c.dataset.id));
    panel.classList.add('open');
  }

  function focusNode(id) {
    const ele = cy.getElementById(id);
    if (!ele || ele.empty()) return;
    if (api && ele.parent().nonempty() && ele.parent().hasClass('cy-expand-collapse-collapsed-node')) {
      try { api.expand(ele.parent()); } catch (e) {}
    }
    cy.elements().removeClass('hl');
    ele.addClass('hl'); ele.connectedEdges().addClass('hl'); ele.neighborhood().addClass('hl');
    cy.animate({ center: { eles: ele }, zoom: Math.max(cy.zoom(), 1.2) }, { duration: 300 });
    showNode(id);
  }

  cy.on('tap', 'node', evt => {
    const n = evt.target;
    if (n.isParent() || n.hasClass('cy-expand-collapse-collapsed-node')) return; // handled by dbltap
    cy.elements().removeClass('hl');
    n.addClass('hl'); n.connectedEdges().addClass('hl'); n.neighborhood().addClass('hl');
    showNode(n.id());
  });
  cy.on('dbltap', 'node', evt => {
    const n = evt.target;
    if (!api) return;
    if (n.hasClass('cy-expand-collapse-collapsed-node')) { try { api.expand(n); } catch (e) {} }
    else if (n.isParent()) { try { api.collapse(n.children()); } catch (e) {} }
  });
  cy.on('tap', evt => { if (evt.target === cy) { cy.elements().removeClass('hl'); } });

  document.getElementById('expandAll').onclick = () => { if (api) { try { api.expandAll(); } catch (e) {} } };
  document.getElementById('collapseAll').onclick = () => { if (api) { try { api.collapseAll(); } catch (e) {} } };
  document.getElementById('fit').onclick = () => cy.animate({ fit: { padding: 40 } }, { duration: 300 });
})();
</script>
</body>
</html>
