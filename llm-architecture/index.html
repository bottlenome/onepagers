<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLMアーキテクチャ比較 2026</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0f172a;
      --bg-2: #1e293b;
      --bg-3: #334155;
      --border: #334155;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #60a5fa;
      --anthropic: #d4a574;
      --google: #4285f4;
      --openai: #10a37f;
      --china: #ef4444;
      --open: #a855f7;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; }

    header { text-align: center; margin-bottom: 2rem; }
    h1 {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(90deg, #60a5fa, #a855f7, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle { color: var(--text-dim); font-size: 1rem; }
    .nav-home {
      display: inline-block;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }
    .nav-home:hover { color: var(--accent); }

    /* Filter tabs */
    .filters {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0 1.5rem;
    }
    .filter-btn {
      background: var(--bg-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }

    /* Model grid */
    .model-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1rem;
    }
    .model-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 12px;
      padding: 1.25rem;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
    }
    .model-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }
    .model-card[data-company="anthropic"] { border-left-color: var(--anthropic); }
    .model-card[data-company="google"] { border-left-color: var(--google); }
    .model-card[data-company="openai"] { border-left-color: var(--openai); }
    .model-card[data-company="china"] { border-left-color: var(--china); }
    .model-card[data-company="open"] { border-left-color: var(--open); }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.75rem;
    }
    .model-name { font-size: 1.15rem; font-weight: 600; }
    .model-vendor {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 0.15rem;
    }
    .arch-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
      background: var(--bg-3);
      color: var(--text);
      white-space: nowrap;
    }
    .arch-badge.moe { background: rgba(168, 85, 247, 0.2); color: #c4b5fd; }
    .arch-badge.dense { background: rgba(96, 165, 250, 0.2); color: #93c5fd; }
    .arch-badge.hybrid { background: rgba(234, 179, 8, 0.2); color: #fde047; }

    .card-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem;
      margin-top: 0.75rem;
      font-size: 0.8rem;
    }
    .meta-item {
      background: var(--bg-3);
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
    }
    .meta-label {
      color: var(--text-dim);
      font-size: 0.7rem;
      display: block;
      margin-bottom: 0.1rem;
    }
    .meta-value { font-weight: 600; color: var(--text); }

    .card-highlight {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .disclosed-badge {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--bg-3);
      color: var(--text-dim);
    }
    .disclosed-badge.open {
      background: rgba(16, 163, 127, 0.2);
      color: #6ee7b7;
    }

    .tags {
      margin-top: 0.75rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
    }
    .tag {
      font-size: 0.65rem;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      background: var(--bg);
      color: var(--text-dim);
      border: 1px solid var(--border);
    }

    /* Upcoming sections placeholder */
    .upcoming {
      margin-top: 3rem;
      padding: 1.5rem;
      background: var(--bg-2);
      border: 1px dashed var(--border);
      border-radius: 12px;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.9rem;
    }
    .upcoming h3 { color: var(--text); margin-bottom: 0.5rem; }
    .upcoming ul {
      display: inline-block;
      text-align: left;
      margin-top: 0.75rem;
      font-size: 0.85rem;
    }
    .upcoming li { margin: 0.25rem 0; }

    footer {
      margin-top: 3rem;
      text-align: center;
      color: var(--text-dim);
      font-size: 0.8rem;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>

    // ========= レンダリング =========

    function renderCards(filter = 'all') {

      const filtered = MODELS.filter(m => {
        if (filter === 'all') return true;
        return m.company === filter || m.subCompany === filter;
      });

      grid.innerHTML = filtered.map(m => `
        <div class="model-card" data-company="${m.company}" data-id="${m.id}">
          <span class="disclosed-badge ${m.disclosed ? 'open' : ''}">
            ${m.disclosed ? '📖 公開' : '🔒 非公開'}
          </span>
          <div class="card-header">
            <div>
              <div class="model-name">${m.name}</div>
              <div class="model-vendor">${m.vendor} · ${m.released}</div>
            </div>
          </div>
          <div>
            <span class="arch-badge ${archBadgeClass(m)}">${m.archType}</span>
          </div>
          <div class="card-meta">
            <div class="meta-item">
              <span class="meta-label">Total params</span>
              <span class="meta-value">${m.params.total}</span>
            </div>
            <div class="meta-item">
              <span class="meta-label">Active params</span>

            </div>
            <div class="meta-item" style="grid-column: span 2;">

              <span class="meta-value">${m.context}</span>
            </div>
          </div>
          <p class="card-highlight">${m.highlight}</p>
          <div class="tags">

        </div>

      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      renderCards(e.target.dataset.filter);
    });

    // 初期レンダリング
