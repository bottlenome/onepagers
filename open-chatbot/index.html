<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Chatbot</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #1e293b;
      --panel-2: #172033;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent-strong: #3b82f6;
      --user: #1d4ed8;
      --assistant: #334155;
      --danger: #ef4444;
      --ok: #22c55e;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 0.9rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-2);
    }
    .title-row { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; }
    header h1 { font-size: 1.25rem; }
    header .home { color: var(--muted); text-decoration: none; font-size: 0.85rem; }
    header .home:hover { color: var(--accent); }
    header p.sub { color: var(--muted); font-size: 0.82rem; margin-top: 0.25rem; }

    .bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.6rem;
      padding: 0.75rem 1.2rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
    }
    .bar label { font-size: 0.8rem; color: var(--muted); }
    select, button, textarea {
      font-family: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    select {
      padding: 0.45rem 0.6rem;
      max-width: 100%;
      min-width: 220px;
    }
    button {
      padding: 0.45rem 0.9rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
    }
    button.primary { background: var(--accent-strong); border-color: var(--accent-strong); color: #fff; }
    button.primary:hover:not(:disabled) { background: var(--accent); }
    button.ghost:hover:not(:disabled) { border-color: var(--accent); }
    button.danger { color: #fecaca; }
    button.danger:hover:not(:disabled) { border-color: var(--danger); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .status-wrap { flex: 1 1 240px; min-width: 200px; }
    .status-text { font-size: 0.78rem; color: var(--muted); margin-bottom: 0.3rem; min-height: 1em; }
    .progress {
      height: 6px;
      background: var(--border);
      border-radius: 9999px;
      overflow: hidden;
    }
    .progress > i {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-strong), var(--accent));
      transition: width 0.2s ease;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 1.2rem;
    }
    .chat { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 0.9rem; }
    .msg { display: flex; }
    .msg.user { justify-content: flex-end; }
    .bubble {
      max-width: 85%;
      padding: 0.7rem 0.95rem;
      border-radius: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.95rem;
    }
    .msg.user .bubble { background: var(--user); color: #fff; border-bottom-right-radius: 4px; }
    .msg.assistant .bubble { background: var(--assistant); border-bottom-left-radius: 4px; }
    .msg .role { font-size: 0.7rem; color: var(--muted); margin: 0 0.3rem; align-self: flex-end; }
    .cursor::after { content: "▍"; color: var(--accent); animation: blink 1s steps(2) infinite; }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

    .empty {
      color: var(--muted);
      text-align: center;
      max-width: 560px;
      margin: 3rem auto;
      line-height: 1.8;
      font-size: 0.9rem;
    }
    .empty code { background: var(--panel); padding: 0.1rem 0.35rem; border-radius: 5px; color: var(--accent); }

    .warn {
      max-width: 820px;
      margin: 0 auto 1rem;
      background: #3a1d1d;
      border: 1px solid var(--danger);
      color: #fecaca;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      font-size: 0.88rem;
      line-height: 1.6;
    }

    footer {
      border-top: 1px solid var(--border);
      background: var(--panel-2);
      padding: 0.8rem 1.2rem;
    }
    .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 0.6rem; align-items: flex-end; }
    textarea#input {
      flex: 1;
      resize: none;
      padding: 0.65rem 0.8rem;
      max-height: 180px;
      line-height: 1.5;
      font-size: 0.95rem;
    }
    textarea#input:focus { outline: none; border-color: var(--accent); }
    .hint { max-width: 820px; margin: 0.4rem auto 0; color: var(--muted); font-size: 0.72rem; text-align: right; }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>Open Chatbot</h1>
      <a class="home" href="../index.html">← OnePagers</a>
    </div>
    <p class="sub">オープンウェイトLLMをブラウザ内（WebGPU）で実行するチャットボット。APIキー不要・完全ローカル。</p>
  </header>

  <div class="bar">
    <label for="model">モデル</label>
    <select id="model" title="使用するオープンウェイトモデル"></select>
    <button id="load" type="button" class="primary">読込</button>
    <div class="status-wrap">
      <div class="status-text" id="status">モデルを選んで「読込」を押してください。</div>
      <div class="progress"><i id="bar"></i></div>
    </div>
  </div>

  <main>
    <div id="warn" class="warn" style="display:none;"></div>
    <div class="chat" id="chat">
      <div class="empty" id="empty">
        まずは上部でモデルを選び <code>読込</code> を押してください。<br>
        初回はモデルをブラウザにダウンロードします（数百MB〜）。<br>
        2回目以降はブラウザキャッシュから高速に起動します。
      </div>
    </div>
  </main>

  <footer>
    <div class="composer">
      <textarea id="input" rows="1" placeholder="メッセージを入力（Enterで送信 / Shift+Enterで改行）" disabled></textarea>
      <button id="send" type="button" class="primary" disabled>送信</button>
      <button id="stop" type="button" class="ghost" style="display:none;">停止</button>
      <button id="clear" type="button" class="danger ghost" title="会話をリセット">クリア</button>
    </div>
    <div class="hint">応答はあなたの端末上で生成されます。サーバーには何も送信されません。</div>
  </footer>

  <script type="module">
    import { CreateMLCEngine, prebuiltAppConfig } from "https://esm.run/@mlc-ai/web-llm";

    // ---- 状態 -------------------------------------------------------------
    const LS_MODEL = "open-chatbot.model";
    const LS_HISTORY = "open-chatbot.history";
    const SYSTEM_PROMPT = "あなたは親切で有能なアシスタントです。簡潔で分かりやすい日本語で答えてください。";

    let engine = null;       // WebLLM エンジン
    let loadedModel = null;  // 読込済みモデルID
    let generating = false;
    let history = [];        // {role, content}[]（system を除く表示用＝送信用）

    // ---- DOM --------------------------------------------------------------
    const $ = (id) => document.getElementById(id);
    const els = {
      model: $("model"), load: $("load"), status: $("status"), bar: $("bar"),
      chat: $("chat"), empty: $("empty"), warn: $("warn"),
      input: $("input"), send: $("send"), stop: $("stop"), clear: $("clear"),
    };

    // ---- WebGPU 判定 ------------------------------------------------------
    if (!("gpu" in navigator)) {
      els.warn.style.display = "block";
      els.warn.innerHTML = "このブラウザは <b>WebGPU</b> に対応していません。Chrome / Edge など WebGPU 対応ブラウザ（できれば最新版・デスクトップ）で開いてください。";
      els.load.disabled = true;
      els.model.disabled = true;
    }

    // ---- モデル候補（小型優先でキュレーション） --------------------------
    // prebuiltAppConfig.model_list に存在するものだけ採用する。
    const CURATED = [
      { id: "Qwen2.5-1.5B-Instruct-q4f16_1-MLC", label: "Qwen2.5 1.5B Instruct（軽量・約1.0GB）" },
      { id: "Llama-3.2-1B-Instruct-q4f16_1-MLC", label: "Llama 3.2 1B Instruct（最軽量・約0.9GB）" },
      { id: "Llama-3.2-3B-Instruct-q4f16_1-MLC", label: "Llama 3.2 3B Instruct（約2.3GB）" },
      { id: "gemma-2-2b-it-q4f16_1-MLC", label: "Gemma 2 2B IT（約1.6GB）" },
      { id: "Phi-3.5-mini-instruct-q4f16_1-MLC", label: "Phi-3.5 mini Instruct（約2.5GB）" },
      { id: "Qwen2.5-7B-Instruct-q4f16_1-MLC", label: "Qwen2.5 7B Instruct（高品質・約5.1GB / 要高性能GPU）" },
      { id: "Llama-3.1-8B-Instruct-q4f16_1-MLC", label: "Llama 3.1 8B Instruct（高品質・約5.0GB / 要高性能GPU）" },
    ];

    function populateModels() {
      const available = new Set((prebuiltAppConfig?.model_list ?? []).map((m) => m.model_id));
      const list = CURATED.filter((m) => available.has(m.id));
      // キュレーション分が万一見つからない場合は prebuilt 全件にフォールバック
      const final = list.length ? list : (prebuiltAppConfig?.model_list ?? []).map((m) => ({ id: m.model_id, label: m.model_id }));
      els.model.innerHTML = "";
      for (const m of final) {
        const opt = document.createElement("option");
        opt.value = m.id;
        opt.textContent = m.label;
        els.model.appendChild(opt);
      }
      const saved = localStorage.getItem(LS_MODEL);
      if (saved && final.some((m) => m.id === saved)) els.model.value = saved;
    }
    populateModels();

    // ---- 進捗・ステータス -------------------------------------------------
    function setStatus(text) { els.status.textContent = text; }
    function setProgress(ratio) { els.bar.style.width = `${Math.max(0, Math.min(1, ratio)) * 100}%`; }

    // ---- 履歴の永続化 -----------------------------------------------------
    function saveHistory() {
      try { localStorage.setItem(LS_HISTORY, JSON.stringify(history)); } catch (_) {}
    }
    function loadHistory() {
      try {
        const raw = localStorage.getItem(LS_HISTORY);
        if (raw) history = JSON.parse(raw) || [];
      } catch (_) { history = []; }
    }

    // ---- 描画 -------------------------------------------------------------
    function renderAll() {
      els.chat.innerHTML = "";
      if (!history.length) { els.chat.appendChild(els.empty); return; }
      for (const m of history) appendBubble(m.role, m.content);
    }
    function appendBubble(role, content) {
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;
      const tag = document.createElement("span");
      tag.className = "role";
      tag.textContent = role === "user" ? "あなた" : "AI";
      if (role === "user") { wrap.appendChild(tag); wrap.appendChild(bubble); }
      else { wrap.appendChild(bubble); wrap.appendChild(tag); }
      els.chat.appendChild(wrap);
      return bubble;
    }
    function scrollToBottom() {
      const main = document.querySelector("main");
      main.scrollTop = main.scrollHeight;
    }

    loadHistory();
    renderAll();

    // ---- モデル読込 -------------------------------------------------------
    async function loadModel() {
      const modelId = els.model.value;
      if (!modelId) return;
      els.load.disabled = true;
      els.model.disabled = true;
      setProgress(0);
      setStatus("初期化中…");
      try {
        engine = await CreateMLCEngine(modelId, {
          initProgressCallback: (p) => {
            setStatus(p.text || "読込中…");
            if (typeof p.progress === "number") setProgress(p.progress);
          },
        });
        loadedModel = modelId;
        localStorage.setItem(LS_MODEL, modelId);
        setProgress(1);
        setStatus(`準備完了: ${modelId}`);
        els.input.disabled = false;
        els.send.disabled = false;
        els.input.focus();
      } catch (err) {
        console.error(err);
        setProgress(0);
        setStatus("読込に失敗しました: " + (err?.message || err));
        els.warn.style.display = "block";
        els.warn.innerHTML = "モデルの読込に失敗しました。WebGPU対応ブラウザか、十分なGPUメモリがあるか、ネットワーク接続をご確認ください。<br><small>" + (err?.message || err) + "</small>";
      } finally {
        els.load.disabled = false;
        els.model.disabled = false;
      }
    }

    // ---- 送信・生成 -------------------------------------------------------
    async function send() {
      if (generating || !engine) return;
      const text = els.input.value.trim();
      if (!text) return;

      history.push({ role: "user", content: text });
      appendBubble("user", text);
      if (els.empty.parentNode) els.empty.remove();
      els.input.value = "";
      autoGrow();
      saveHistory();
      scrollToBottom();

      generating = true;
      els.send.disabled = true;
      els.input.disabled = true;
      els.stop.style.display = "";

      const bubble = appendBubble("assistant", "");
      bubble.classList.add("cursor");
      let acc = "";

      const messages = [{ role: "system", content: SYSTEM_PROMPT }, ...history];

      try {
        const stream = await engine.chat.completions.create({
          messages,
          stream: true,
          temperature: 0.7,
        });
        for await (const chunk of stream) {
          const delta = chunk.choices?.[0]?.delta?.content || "";
          if (delta) {
            acc += delta;
            bubble.textContent = acc;
            scrollToBottom();
          }
        }
      } catch (err) {
        if (err?.name === "AbortError" || /abort/i.test(String(err?.message))) {
          acc += acc ? "\n\n[停止しました]" : "[停止しました]";
        } else {
          console.error(err);
          acc += "\n\n[エラー: " + (err?.message || err) + "]";
        }
        bubble.textContent = acc;
      } finally {
        bubble.classList.remove("cursor");
        history.push({ role: "assistant", content: acc });
        saveHistory();
        generating = false;
        els.stop.style.display = "none";
        els.send.disabled = false;
        els.input.disabled = false;
        els.input.focus();
        scrollToBottom();
      }
    }

    async function stop() {
      if (engine && generating) {
        try { await engine.interruptGenerate(); } catch (_) {}
      }
    }

    function clearChat() {
      if (generating) return;
      if (!history.length) return;
      if (!confirm("会話履歴をすべて消去しますか？")) return;
      history = [];
      saveHistory();
      renderAll();
    }

    // ---- 入力欄の自動リサイズ＋キー操作 ----------------------------------
    function autoGrow() {
      els.input.style.height = "auto";
      els.input.style.height = Math.min(els.input.scrollHeight, 180) + "px";
    }
    els.input.addEventListener("input", autoGrow);
    els.input.addEventListener("keydown", (e) => {
      // IME 変換確定の Enter（日本語入力中）は送信しない
      if (e.isComposing || e.keyCode === 229) return;
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    // ---- イベント結線 -----------------------------------------------------
    els.load.addEventListener("click", loadModel);
    els.send.addEventListener("click", send);
    els.stop.addEventListener("click", stop);
    els.clear.addEventListener("click", clearChat);
  </script>
</body>
</html>
