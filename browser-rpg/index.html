<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Loveless Chronicle - OnePagers</title>
<style>
/* ═══════════════════════════════════════
   Loveless Chronicle - CSS
   ═══════════════════════════════════════ */
:root {
  --bg: #0f172a;
  --panel: #1e293b;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
  --accent: #60a5fa;
  --hp: #22c55e;
  --mp: #818cf8;
  --gold: #fbbf24;
  --danger: #ef4444;
  --success: #22c55e;
  --warn: #f59e0b;
  --phys: #f97316;
  --mag: #a78bfa;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-text-size-adjust: 100%;
}
#app {
  max-width: 640px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* --- Header (Player info bar) --- */
#hdr {
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  padding: 8px 12px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.hdr-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  font-size: 0.85rem;
}
.hdr-name { font-weight: bold; color: var(--accent); }
.hdr-job { color: var(--muted); }
.hdr-gold { color: var(--gold); font-weight: bold; }
.hdr-loc { color: var(--muted); font-size: 0.75rem; }
.hdr-bars { display: flex; gap: 8px; margin-top: 4px; }
.bar-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 0.75rem;
}
.bar-label { width: 22px; text-align: right; font-weight: bold; }
.bar-label.hp { color: var(--hp); }
.bar-label.mp { color: var(--mp); }
.bar-track {
  flex: 1;
  height: 10px;
  background: var(--border);
  border-radius: 5px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.3s;
}
.bar-fill.hp { background: var(--hp); }
.bar-fill.mp { background: var(--mp); }
.bar-fill.exp { background: var(--accent); }
.bar-num { width: 70px; font-size: 0.7rem; color: var(--muted); text-align: right; }

/* --- Main content --- */
#main {
  flex: 1;
  padding: 12px;
  overflow-y: auto;
}

/* --- Log --- */
#log {
  background: var(--panel);
  border-top: 1px solid var(--border);
  max-height: 120px;
  overflow-y: auto;
  padding: 6px 12px;
  font-size: 0.78rem;
}
.log-entry { padding: 1px 0; border-left: 3px solid var(--border); padding-left: 8px; margin: 2px 0; }
.log-entry.system { border-color: var(--muted); color: var(--muted); }
.log-entry.battle { border-color: var(--phys); }
.log-entry.magic { border-color: var(--mag); }
.log-entry.heal { border-color: var(--hp); color: var(--hp); }
.log-entry.reward { border-color: var(--gold); color: var(--gold); }
.log-entry.danger { border-color: var(--danger); color: var(--danger); }
.log-entry.levelup { border-color: var(--accent); color: var(--accent); font-weight: bold; }

/* --- Back link --- */
.back {
  display: inline-block;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  margin-bottom: 8px;
}
.back:hover { color: var(--accent); }

/* --- Buttons --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 18px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--panel);
  color: var(--text);
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.15s;
  text-decoration: none;
  user-select: none;
  -webkit-user-select: none;
  min-height: 44px;
}
.btn:hover { border-color: var(--accent); background: #263347; }
.btn:active { transform: scale(0.97); }
.btn.primary { background: #2563eb; border-color: #2563eb; color: #fff; }
.btn.primary:hover { background: #1d4ed8; }
.btn.danger { background: #dc2626; border-color: #dc2626; color: #fff; }
.btn.danger:hover { background: #b91c1c; }
.btn.gold { background: #d97706; border-color: #d97706; color: #fff; }
.btn.gold:hover { background: #b45309; }
.btn.small { padding: 6px 12px; font-size: 0.8rem; min-height: 36px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }

/* --- Cards / Panels --- */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  margin-bottom: 10px;
}
.panel h3 { font-size: 0.95rem; margin-bottom: 8px; color: var(--accent); }
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 8px;
}
.facility-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 14px 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  font-size: 0.85rem;
}
.facility-btn:hover { border-color: var(--accent); background: #263347; }
.facility-btn .icon { font-size: 1.5rem; }
.facility-btn .label { font-size: 0.8rem; }

/* --- Title screen --- */
.title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 70vh;
  text-align: center;
}
.title-screen .icon { font-size: 4rem; margin-bottom: 12px; }
.title-screen h1 { font-size: 2rem; margin-bottom: 4px; }
.title-screen .sub { color: var(--muted); margin-bottom: 32px; }
.title-screen .btn-row { flex-direction: column; width: 200px; }

/* --- Naming screen --- */
.naming { max-width: 400px; margin: 40px auto; text-align: center; }
.naming input {
  width: 100%;
  padding: 10px;
  background: var(--border);
  border: 1px solid var(--muted);
  border-radius: 6px;
  color: var(--text);
  font-size: 1rem;
  margin: 12px 0;
  text-align: center;
}
.naming input:focus { outline: none; border-color: var(--accent); }
.job-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 16px 0; }
.job-card {
  padding: 12px;
  background: var(--panel);
  border: 2px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
}
.job-card:hover { border-color: var(--accent); }
.job-card.selected { border-color: var(--accent); background: #1e3a5f; }
.job-card .name { font-weight: bold; margin-bottom: 4px; }
.job-card .desc { font-size: 0.75rem; color: var(--muted); }
.job-card .stats { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

/* --- Field screen --- */
.field-info {
  text-align: center;
  padding: 16px 0;
}
.field-info .area-name { font-size: 1.2rem; font-weight: bold; color: var(--accent); }
.field-info .layer { font-size: 0.9rem; color: var(--muted); }

/* --- Battle screen --- */
.battle-enemy {
  text-align: center;
  padding: 16px;
  margin-bottom: 12px;
}
.battle-enemy .emoji { font-size: 3rem; }
.battle-enemy .name { font-size: 1.1rem; font-weight: bold; margin: 4px 0; }
.battle-log {
  background: #0c1222;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px;
  min-height: 120px;
  max-height: 250px;
  overflow-y: auto;
  font-size: 0.82rem;
  margin: 8px 0;
}
.battle-log .bl { padding: 2px 0; }
.bl.p-atk { color: var(--phys); }
.bl.p-mag { color: var(--mag); }
.bl.p-heal { color: var(--hp); }
.bl.e-atk { color: var(--danger); }
.bl.sys { color: var(--muted); }
.bl.reward { color: var(--gold); }
.bl.lvup { color: var(--accent); font-weight: bold; }
.bonus-growth { color: var(--gold); font-weight: bold; }

/* --- Shop / list screens --- */
.shop-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
}
.shop-item:last-child { border-bottom: none; }
.shop-item .info { flex: 1; }
.shop-item .name { font-size: 0.9rem; }
.shop-item .detail { font-size: 0.75rem; color: var(--muted); }
.shop-item .price { color: var(--gold); font-weight: bold; font-size: 0.85rem; white-space: nowrap; }

/* --- Status tabs --- */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 10px;
  overflow-x: auto;
}
.tab {
  padding: 8px 14px;
  font-size: 0.82rem;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: var(--muted);
  white-space: nowrap;
}
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-color: var(--accent); }

/* --- Stats table --- */
.stat-table { width: 100%; font-size: 0.85rem; }
.stat-table td { padding: 4px 8px; }
.stat-table .label { color: var(--muted); width: 60px; }
.stat-table .val { font-weight: bold; }
.stat-table .bonus { color: var(--hp); font-size: 0.75rem; }

/* --- Equipment slots --- */
.equip-slot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 6px;
}
.equip-slot .slot-label { color: var(--muted); font-size: 0.8rem; width: 60px; }
.equip-slot .slot-item { flex: 1; font-size: 0.85rem; }
.equip-slot .slot-empty { color: var(--muted); font-style: italic; }
.durability { font-size: 0.7rem; }
.dur-ok { color: var(--hp); }
.dur-warn { color: var(--warn); }
.dur-danger { color: var(--danger); }

/* --- Enhancement / crafting --- */
.recipe-item {
  padding: 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  margin-bottom: 8px;
  background: var(--bg);
}
.recipe-item .recipe-name { font-weight: bold; margin-bottom: 4px; }
.recipe-item .recipe-mats { font-size: 0.8rem; color: var(--muted); }
.recipe-item .recipe-rate { font-size: 0.8rem; }
.rate-high { color: var(--hp); }
.rate-mid { color: var(--warn); }
.rate-low { color: var(--danger); }

/* --- Misc --- */
.text-center { text-align: center; }
.text-muted { color: var(--muted); }
.text-gold { color: var(--gold); }
.text-accent { color: var(--accent); }
.text-danger { color: var(--danger); }
.text-success { color: var(--success); }
.mt-1 { margin-top: 8px; }
.mt-2 { margin-top: 16px; }
.mb-1 { margin-bottom: 8px; }
.mb-2 { margin-bottom: 16px; }
.hidden { display: none !important; }
.sep { border-top: 1px solid var(--border); margin: 10px 0; }
h2 { font-size: 1.1rem; margin-bottom: 10px; }
.msg-box {
  padding: 16px;
  text-align: center;
  background: var(--panel);
  border-radius: 8px;
  margin: 16px 0;
}

/* --- Responsive --- */
@media (max-width: 480px) {
  #app { font-size: 14px; }
  .card-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .job-grid { grid-template-columns: 1fr; }
  .hdr-top { font-size: 0.78rem; }
  .btn { padding: 8px 14px; font-size: 0.85rem; }
  .battle-enemy .emoji { font-size: 2.5rem; }
}
</style>
</head>
<body>
<div id="app">
  <header id="hdr"></header>
  <main id="main"></main>
  <footer id="log"></footer>
</div>

// 装備オブジェクト生成 (インベントリ用)
function createEquip(baseId, enhancement) {
  const base = EQUIPS[baseId];
  if (!base) return null;
  return {
    baseId,
    enhancement: enhancement || 0,
    durability: base.dur,
    maxDurability: base.dur,
  };
}

// 通常モンスターのステータス計算
function calcMonsterStats(level) {
  return {
    hp: level * 10 + 10,
    maxHp: level * 10 + 10,
    atk: Math.floor(level * 3 + 2),
    def: level * 2,
    matk: level * 2,
    mdef: level * 2,
    spd: level * 2 + 2,
  };
}

// モンスター生成
function spawnMonster(areaId, layer) {
  // ボスチェック
  const bossKey = areaId + '_' + layer;
  if (BOSSES[bossKey]) return { ...BOSSES[bossKey] };

  const pool = MONSTER_POOL.filter(m => m.area === areaId && m.minLv <= layer && m.maxLv >= layer);
  if (pool.length === 0) {
    // フォールバック: 最も近いモンスターを使う
    const all = MONSTER_POOL.filter(m => m.area === areaId);
    if (all.length === 0) return null;
    pool.push(all[Math.floor(Math.random() * all.length)]);
  }
  const tmpl = pool[Math.floor(Math.random() * pool.length)];
  const stats = calcMonsterStats(layer);
  return {
    name: tmpl.name,
    emoji: tmpl.emoji,
    level: layer,
    ...stats,
    boss: false,
    special: tmpl.special,
    drops: tmpl.drops || [],
  };
}

// フィールドの接続ルール (area, layer) → 移動可能な先
function getFieldExits(area, layer) {
  const info = AREA_INFO[area];
  if (!info) return [];
  const exits = [];

  // 町への入口
  const townKey = area + '_' + layer;
  if (FIELD_TOWN_MAP[townKey]) {
    const tid = FIELD_TOWN_MAP[townKey];
    exits.push({ type:'town', id:tid, label:TOWN_INFO[tid].name + 'に入る' });
  }

  // 古城入口 (荒野の道 階層20から)
  if (area === 'wasteland' && layer === 20) {
    exits.push({ type:'field', area:'old_castle', layer:21, label:'古城に入る' });
  }

  // 古城→隠し通路 (条件付き)
  if (area === 'old_castle' && layer === 25) {
    // 隠し通路は古城ボス10回撃破後に出現
    exits.push({ type:'field', area:'old_castle', layer:24, label:'古城 階層24へ戻る' });
    // 隠し通路判定は render 時に G.player を見て追加
  }

  // 前進
  if (layer < info.maxLv) {
    exits.push({ type:'field', area, layer:layer+1, label:info.name+' 階層'+(layer+1)+'へ進む' });
  }
  // 後退
  if (layer > info.minLv) {
    exits.push({ type:'field', area, layer:layer-1, label:info.name+' 階層'+(layer-1)+'へ戻る' });
  }

  // エリア間接続 (町の外のモンスター階層から次エリアへ)
  if (area === 'grassland'   && layer === 15) exits.push({ type:'field', area:'wasteland', layer:16, label:'荒野の道 階層16へ' });
  if (area === 'lost_forest' && layer === 25) exits.push({ type:'field', area:'demon_forest', layer:26, label:'魔の森 階層26へ' });
  if (area === 'wasteland'   && layer === 25) exits.push({ type:'field', area:'last_dungeon', layer:25, label:'ラストダンジョン 階層25へ' });

  // エリア端からの帰還
  if (area === 'mountain'    && layer === 11) exits.push({ type:'town', id:'porttown', label:'港町へ戻る' });
  if (area === 'mine'        && layer === 21) exits.push({ type:'town', id:'minetown', label:'鉱山の町へ戻る' });
  if (area === 'lost_forest' && layer === 16) exits.push({ type:'town', id:'castle', label:'城へ戻る' });
  if (area === 'demon_forest'&& layer === 26) exits.push({ type:'town', id:'elfvillage', label:'エルフの里へ戻る' });
  if (area === 'wasteland'   && layer === 15) exits.push({ type:'town', id:'castle', label:'城へ戻る' });
  if (area === 'wasteland'   && layer === 16) exits.push({ type:'field', area:'grassland', layer:15, label:'草原 階層15へ戻る' });
  if (area === 'old_castle'  && layer === 21) exits.push({ type:'field', area:'wasteland', layer:20, label:'荒野の道へ戻る' });
  if (area === 'old_castle_hidden' && layer === 25) exits.push({ type:'field', area:'old_castle', layer:25, label:'古城 階層25へ戻る' });
  if (area === 'last_dungeon'&& layer === 25) exits.push({ type:'town', id:'lasttown', label:'最後の街へ戻る' });

  return exits;
}

// ユーティリティ
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

   ステータス計算・成長システム
   ═══════════════════════════════════════ */

// 装備なしの素のステータス
function calcNakedStats(p) {
  const s = {};
  for (const k of STAT_KEYS) {
    s[k] = INIT_STATS[k] + (p.baseStats[k] || 0) + (p.growthStats[k] || 0);
  }
  return s;
}

// 装備込みの完全ステータス
function calcStats(p) {
  const s = calcNakedStats(p);
  for (const slot of ['weapon','armor','accessory']) {
    const eo = p.equipObjs[slot];
    if (!eo) continue;
    const base = EQUIPS[eo.baseId];
    if (!base) continue;
    for (const [k,v] of Object.entries(base.s)) {
      s[k] = (s[k] || 0) + v;
    }
    // 強化ボーナス
    if (eo.enhancement > 0) {
      if (slot === 'weapon') s.atk += eo.enhancement * ENHANCE_BONUS.weapon;
      if (slot === 'armor')  s.def += eo.enhancement * ENHANCE_BONUS.armor;
    }
  }
  return { maxHp:s.hp, maxMp:s.mp, atk:s.atk, def:s.def, matk:s.matk, mdef:s.mdef, spd:s.spd };
}

// 成長率取得 (隠しパラメータ: 職業 + 装備)
function getGrowthRates(p) {
  const job = JOBS[p.jobId];
  const rates = {};
  for (const k of STAT_KEYS) rates[k] = job.rate[k] || 0;
  // 装備の成長率ボーナス
  for (const slot of ['weapon','armor','accessory']) {
    const eo = p.equipObjs[slot];
    if (!eo) continue;
    const base = EQUIPS[eo.baseId];
    if (!base || !base.g) continue;
    for (const [k,v] of Object.entries(base.g)) {
      rates[k] = Math.min(0.95, (rates[k] || 0) + v);
    }
  }
  return rates;
}

// レベルアップ処理
function processLevelUp(p) {
  const job = JOBS[p.jobId];
  const rates = getGrowthRates(p);
  const gains = {};
  const bonuses = {};
  for (const k of STAT_KEYS) {
    let g = job.base[k] || 0;
    const gotBonus = Math.random() < (rates[k] || 0);
    if (gotBonus) { g += 1; bonuses[k] = true; }
    p.growthStats[k] = (p.growthStats[k] || 0) + g;
    gains[k] = g;
  }
  p.level++;
  const st = calcStats(p);
  p.hp = Math.min(p.hp + gains.hp, st.maxHp);
  p.mp = Math.min(p.mp + gains.mp, st.maxMp);
  return { gains, bonuses };
}

// 経験値関連
function expForNextLevel(level) { return level * 10; }

function calcExpGain(playerLv, monsterLv) {
  if (playerLv > monsterLv) {
    // 高レベルで低い階層: 差が大きいほど経験値減少、差5超で0
    const diff = playerLv - monsterLv;
    if (diff > 5) return 0;
    return Math.max(1, Math.floor(15 + monsterLv - diff * 4));
  } else {
    // 低レベルで高い階層: 差が大きいほどボーナス
    const diff = monsterLv - playerLv;
    return Math.floor(15 + monsterLv + diff * 2);
  }
}

// 転職処理
function changeJob(p, newJobId) {
  const isBasic = JOBS[newJobId].type === 'basic';
  if (!p.jobHistory.includes(p.jobId)) p.jobHistory.push(p.jobId);
  if (isBasic) {
    // 下級職転職: Lv.1に戻り、成長分の70%を引き継ぐ
    const naked = calcNakedStats(p);
    const newBase = {};
    for (const k of STAT_KEYS) {
      const grown = (naked[k] || 0) - INIT_STATS[k];
      newBase[k] = Math.floor(grown * CARRY_RATIO_BASIC);
    }
    p.baseStats = newBase;
    p.growthStats = { hp:0, mp:0, atk:0, def:0, matk:0, mdef:0, spd:0 };
    p.level = 1;
    p.exp = 0;
  } else {
    // 上級職転職: ステータスボーナスを付与
    const advJob = JOBS[newJobId];
    for (const k of STAT_KEYS) {
      const bonus = Math.floor((advJob.base[k] || 0) * 3);
      p.growthStats[k] = (p.growthStats[k] || 0) + bonus;
    }
  }
  p.jobId = newJobId;
  p.jobChangeCount = (p.jobChangeCount || 0) + 1;
  p.postTransferLevelUp = true;
  const st = calcStats(p);
  p.hp = st.maxHp;
  p.mp = st.maxMp;
}

// 利用可能スキル一覧
function getAvailableSkills(p) {
  const skills = [];
  const job = JOBS[p.jobId];
  // 上級職スキル
  if (job.skills) {
    for (const js of job.skills) {
      if (p.level >= js.lv) skills.push(js.id);
    }
  }
  // 装備スキル
  for (const slot of ['weapon','armor','accessory']) {
    const eo = p.equipObjs[slot];
    if (!eo) continue;
    const base = EQUIPS[eo.baseId];
    if (!base) continue;
    const skillId = SUBTYPE_SKILL[base.sub];
    if (skillId && !skills.includes(skillId)) skills.push(skillId);
    // 鍛冶で付与された貴重スキル
    if (eo.grantedSkill && !skills.includes(eo.grantedSkill)) skills.push(eo.grantedSkill);
  }
  return skills;
}

function addBattleLog(msg, cls) {
  cls = cls || 'sys';
  G.battle.log.push({ msg, cls });
  updateBattleLog();
}

function updateBattleLog() {
  const el = document.getElementById('battle-log');
  if (!el) return;
  el.innerHTML = G.battle.log.map(e => `<div class="bl ${e.cls}">${e.msg}</div>`).join('');
  el.scrollTop = el.scrollHeight;
  // ヘッダー更新
  document.getElementById('hdr').innerHTML = renderHeader();
  // 敵HP更新
  const ehp = document.getElementById('enemy-hp');
  if (ehp && G.battle.enemy) {
    const e = G.battle.enemy;
    const pct = Math.max(0, e.hp / e.maxHp * 100);
    ehp.style.width = pct + '%';
  }
  const ehpNum = document.getElementById('enemy-hp-num');
  if (ehpNum && G.battle.enemy) {
    ehpNum.textContent = Math.max(0, G.battle.enemy.hp) + '/' + G.battle.enemy.maxHp;
  }
}

async function runBattle() {
  const p = G.player;
  const e = G.battle.enemy;
  const spd = G.settings.battleSpeed;

  if (G.demo) {
    addBattleLog('--- 遠い未来の戦いの記憶… ---', 'sys');
    await delay(spd);
  }
  addBattleLog(`${e.emoji} ${e.name} Lv.${e.level} が現れた！`, 'sys');
  await delay(spd);

  while (!G.battle.over) {
    G.battle.turn++;
    // デモバトル: 最大15ターンで打ち切り
    if (G.demo && G.battle.turn > 15) {
      G.battle.over = true;
      G.battle.won = true;
      handleVictory(p, e);
      break;
    }
    const pStats = calcStats(p);
    // 魔法使いパッシブ: 毎ターンMP回復
    const mpPassive = JOBS[p.jobId].passive;
    if (mpPassive && mpPassive.id === 'mp_regen') {
      p.mp = Math.min(p.mp + mpPassive.value, pStats.maxMp);
    }
    const playerFirst = pStats.spd >= e.spd;

    if (playerFirst) {
      await doPlayerAction(p, e, pStats);
      if (G.battle.over) break;
      await doEnemyAction(p, e, pStats);
    } else {
      await doEnemyAction(p, e, pStats);
      if (G.battle.over) break;
      await doPlayerAction(p, e, pStats);
    }
  }
}

async function doPlayerAction(p, e, pStats) {
  const spd = G.settings.battleSpeed;
  // 効果チェック
  if (hasEffect(G.battle.playerEffects, 'stun')) {
    addBattleLog(`${p.name}は動けない！`, 'sys');
    tickEffects(G.battle.playerEffects);
    await delay(spd);
    return;
  }

  const action = selectPlayerAction(p, e, pStats);

  if (action.type === 'item') {
    const item = ITEMS[action.id];
    removeItem(p, action.id, 1);
    if (item.healHp) {
      const amt = item.healHp === -1 ? pStats.maxHp : item.healHp;
      p.hp = Math.min(p.hp + amt, pStats.maxHp);
    }
    if (item.healMp) {
      const amt = item.healMp === -1 ? pStats.maxMp : item.healMp;
      p.mp = Math.min(p.mp + amt, pStats.maxMp);
    }
    addBattleLog(`${p.name}は${item.name}を使った！`, 'p-heal');
  } else if (action.type === 'skill') {
    const sk = SKILLS[action.id];
    p.mp -= sk.cost;
    executeSkill(p, e, pStats, sk, action.id, true);
  } else if (action.type === 'defend') {
    G.battle.playerEffects.push({ id:'guard', turns:1 });
    addBattleLog(`${p.name}は身を守っている！`, 'sys');
  } else {
    // 通常攻撃
    const dmg = calcPhysDamage(pStats.atk, e.def);
    const crit = Math.random() < 0.05;
    const finalDmg = crit ? dmg * 2 : dmg;
    e.hp -= finalDmg;
    addBattleLog(`${p.name}の攻撃！${finalDmg}のダメージ！${crit ? '会心の一撃！' : ''}`, 'p-atk');
  }
  await delay(spd);
  checkBattleEnd(p, e);
  tickEffects(G.battle.playerEffects);
}

async function doEnemyAction(p, e, pStats) {
  const spd = G.settings.battleSpeed;
  if (hasEffect(G.battle.enemyEffects, 'stun')) {
    addBattleLog(`${e.name}は動けない！`, 'sys');
    tickEffects(G.battle.enemyEffects);
    await delay(spd);
    return;
  }
  // 特殊攻撃 (ボスごとの発動率, デフォルト30%)
  if (e.special && Math.random() < (e.specialRate || 0.30)) {
    const sk = SKILLS[e.special];
    if (sk) {
      const isMag = sk.type === 'magical' || sk.type === 'hybrid';
      const power = sk.power || 1.5;
      const dmg = isMag
        ? calcMagDamage(e.matk * power, pStats.mdef)
        : calcPhysDamage(e.atk * power, pStats.def);
      let reduced = applyDefenseEffects(dmg, G.battle.playerEffects, isMag);
      // 戦士パッシブ: 被ダメ軽減
      const psvS = JOBS[G.player.jobId].passive;
      if (psvS && psvS.id === 'dmg_reduce') reduced = Math.max(1, Math.floor(reduced * (1 - psvS.value)));
      p.hp -= reduced;
      addBattleLog(`${e.name}の${sk.name}！${reduced}のダメージ！`, 'e-atk');
      await delay(spd);
      checkBattleEnd(p, e);
      tickEffects(G.battle.enemyEffects);
      return;
    }
  }
  // 通常攻撃
  const dmg = calcPhysDamage(e.atk, pStats.def);
  let reduced = applyDefenseEffects(dmg, G.battle.playerEffects, false);
  // 戦士パッシブ: 被ダメ軽減
  const psvN = JOBS[G.player.jobId].passive;
  if (psvN && psvN.id === 'dmg_reduce') reduced = Math.max(1, Math.floor(reduced * (1 - psvN.value)));
  p.hp -= reduced;
  addBattleLog(`${e.name}の攻撃！${reduced}のダメージ！`, 'e-atk');
  await delay(spd);
  checkBattleEnd(p, e);
  tickEffects(G.battle.enemyEffects);
}

function executeSkill(user, target, userStats, sk, skillId, isPlayer) {
  const prefix = isPlayer ? G.player.name : G.battle.enemy.name;
  const atkCls = isPlayer ? 'p-atk' : 'e-atk';
  const magCls = isPlayer ? 'p-mag' : 'e-atk';
  const healCls = isPlayer ? 'p-heal' : 'sys';

  if (sk.type === 'physical') {
    const baseDmg = calcPhysDamage(userStats.atk * sk.power, target.def || calcStats(target).def || 0);
    const hits = sk.hits || 1;
    let totalDmg = 0;
    const crit = Math.random() < (sk.crit || 0.05);
    for (let i = 0; i < hits; i++) {
      let d = crit ? baseDmg * 2 : baseDmg;
      if (!isPlayer) d = applyDefenseEffects(d, G.battle.playerEffects, false);
      totalDmg += d;
    }
    if (isPlayer) { G.battle.enemy.hp -= totalDmg; }
    else { G.player.hp -= totalDmg; }
    addBattleLog(`${prefix}の${sk.name}！${totalDmg}のダメージ！${crit?'会心！':''}`, atkCls);
    if (sk.stun && Math.random() < sk.stun) {
      const effects = isPlayer ? G.battle.enemyEffects : G.battle.playerEffects;
      effects.push({ id:'stun', turns:1 });
      addBattleLog(`${isPlayer ? G.battle.enemy.name : G.player.name}は気絶した！`, 'sys');
    }
  } else if (sk.type === 'magical') {
    const dmg = calcMagDamage(userStats.matk * sk.power, target.mdef || 0);
    const finalDmg = isPlayer ? dmg : applyDefenseEffects(dmg, G.battle.playerEffects, true);
    if (isPlayer) { G.battle.enemy.hp -= finalDmg; }
    else { G.player.hp -= finalDmg; }
    addBattleLog(`${prefix}の${sk.name}！${finalDmg}のダメージ！`, magCls);
    if (sk.healPct && isPlayer) {
      const heal = Math.floor(calcStats(G.player).maxHp * sk.healPct);
      G.player.hp = Math.min(G.player.hp + heal, calcStats(G.player).maxHp);
      addBattleLog(`HPが${heal}回復した！`, 'p-heal');
    }
  } else if (sk.type === 'hybrid') {
    const pDmg = calcPhysDamage(userStats.atk * sk.power, target.def || 0);
    const mDmg = calcMagDamage(userStats.matk * sk.power, target.mdef || 0);
    const total = Math.floor((pDmg + mDmg) / 2);
    if (isPlayer) { G.battle.enemy.hp -= total; }
    else { G.player.hp -= applyDefenseEffects(total, G.battle.playerEffects, false); }
    addBattleLog(`${prefix}の${sk.name}！${total}のダメージ！`, atkCls);
  } else if (sk.type === 'heal') {
    const st = calcStats(G.player);
    const amt = Math.floor(st.maxHp * sk.power);
    G.player.hp = Math.min(G.player.hp + amt, st.maxHp);
    addBattleLog(`${prefix}の${sk.name}！HPが${amt}回復！`, healCls);
  } else if (sk.type === 'buff') {
    const effects = isPlayer ? G.battle.playerEffects : G.battle.enemyEffects;
    effects.push({ id:sk.effect, turns:3 });
    addBattleLog(`${prefix}の${sk.name}！`, 'sys');
  }
}

// AI: プレイヤー行動選択
function selectPlayerAction(p, e, pStats) {
  const skills = getAvailableSkills(p);
  const hpRatio = p.hp / pStats.maxHp;
  const strat = G.settings.strategy;

  // 利用可能スキル (MP足りるもの)
  const usable = skills.filter(id => SKILLS[id] && p.mp >= SKILLS[id].cost);
  const heals = usable.filter(id => SKILLS[id].type === 'heal');
  const attacks = usable
    .filter(id => ['physical','magical','hybrid'].includes(SKILLS[id].type))
    .sort((a,b) => (SKILLS[b].power||0) - (SKILLS[a].power||0));
  const healItem = findHealItem(p);

  switch (strat) {
    case 'aggressive':
      if (hpRatio < 0.2 && heals.length) return { type:'skill', id:heals[0] };
      if (hpRatio < 0.15 && healItem) return { type:'item', id:healItem };
      if (attacks.length) return { type:'skill', id:attacks[0] };
      return { type:'attack' };
    case 'careful':
      if (hpRatio < 0.5 && heals.length) return { type:'skill', id:heals[0] };
      if (hpRatio < 0.4 && healItem) return { type:'item', id:healItem };
      if (attacks.length) return { type:'skill', id:attacks[Math.floor(attacks.length/2)] };
      return { type:'attack' };
    case 'physical':
      if (hpRatio < 0.2 && healItem) return { type:'item', id:healItem };
      const phys = attacks.filter(id => SKILLS[id].type === 'physical');
      if (phys.length) return { type:'skill', id:phys[0] };
      return { type:'attack' };
    default: // balanced
      if (hpRatio < 0.3 && heals.length) return { type:'skill', id:heals[0] };
      if (hpRatio < 0.25 && healItem) return { type:'item', id:healItem };
      if (attacks.length) return { type:'skill', id:attacks[0] };
      return { type:'attack' };
  }
}

function findHealItem(p) {
  for (const id of ['elixir','world_branch','hi_herb','herb']) {
    if (hasItem(p, id, 1)) return id;
  }
  return null;
}

// ダメージ計算
function calcPhysDamage(atk, def) {
  return Math.max(1, Math.floor(atk - def * 0.5) + rand(-2, 2));
}
function calcMagDamage(matk, mdef) {
  return Math.max(1, Math.floor(matk - mdef * 0.5) + rand(-2, 2));
}

// 防御効果適用
function applyDefenseEffects(dmg, effects, isMagic) {
  if (hasEffect(effects, 'invincible')) {
    removeEffect(effects, 'invincible');
    return 0;
  }
  if (hasEffect(effects, 'guard')) dmg = Math.floor(dmg * 0.5);
  if (hasEffect(effects, 'ironwall')) dmg = Math.floor(dmg * 0.3);
  if (hasEffect(effects, 'smoke') && Math.random() < 0.5) return 0;
  if (hasEffect(effects, 'evade') && Math.random() < 0.5) return 0;
  if (isMagic && hasEffect(effects, 'mbarrier')) dmg = Math.floor(dmg * 0.5);
  return Math.max(1, dmg);
}

// 効果管理
function hasEffect(effects, id) { return effects.some(e => e.id === id); }
function removeEffect(effects, id) {
  const idx = effects.findIndex(e => e.id === id);
  if (idx >= 0) effects.splice(idx, 1);
}
function tickEffects(effects) {
  for (let i = effects.length - 1; i >= 0; i--) {
    effects[i].turns--;
    if (effects[i].turns <= 0) effects.splice(i, 1);
  }
}

// 戦闘終了チェック
function checkBattleEnd(p, e) {
  if (e.hp <= 0) {
    e.hp = 0;
    G.battle.over = true;
    G.battle.won = true;
    handleVictory(p, e);
  } else if (p.hp <= 0) {
    p.hp = 0;
    G.battle.over = true;
    G.battle.won = false;
    handleDefeat(p, e);
  }
}

async function handleVictory(p, e) {
  const spd = G.settings.battleSpeed;
  addBattleLog(`${e.name}を倒した！`, 'reward');
  await delay(spd);

  // デモバトル: 報酬処理スキップ
  if (G.demo) {
    addBattleLog('勝利！', 'lvup');
    await delay(spd * 2);
    const cont = document.getElementById('battle-continue');
    if (cont) {
      cont.innerHTML = '<button class="btn primary" data-a="battleend">続ける</button>';
      cont.classList.remove('hidden');
    }
    return;
  }

  // 僧侶パッシブ: 戦闘勝利後HP回復
  const priestPsv = JOBS[p.jobId].passive;
  if (priestPsv && priestPsv.id === 'post_heal') {
    const stH = calcStats(p);
    const healAmt = Math.floor(stH.maxHp * priestPsv.value);
    p.hp = Math.min(p.hp + healAmt, stH.maxHp);
    addBattleLog(`祝福の力でHPが${healAmt}回復した`, 'p-heal');
    await delay(spd);
  }

  // EXP
  const exp = e.boss ? Math.floor(e.level * 5) : calcExpGain(p.level, e.level);
  if (exp > 0) {
    p.exp += exp;
    addBattleLog(`経験値${exp}を獲得！`, 'reward');
  }

  // ゴールド
  const gold = e.boss ? e.level * 30 : e.level * 3 + rand(0, e.level * 2);
  p.gold += gold;
  addBattleLog(`${gold}Gを獲得！`, 'reward');
  await delay(spd);

  // ドロップ
  if (e.drops) {
    const thiefPsv = JOBS[p.jobId].passive;
    const dropBonus = (thiefPsv && thiefPsv.id === 'drop_bonus') ? thiefPsv.value : 0;
    for (const d of e.drops) {
      if (Math.random() < d.rate + dropBonus) {
        addItemToPlayer(p, d.id, 1);
        const info = ITEMS[d.id] || EQUIPS[d.id];
        addBattleLog(`${info ? info.name : d.id}を手に入れた！`, 'reward');
        await delay(spd);
      }
    }
  }

  // ダンジョン宝箱
  const areaId = p.location.type === 'field' ? p.location.area : null;
  const isDungeon = areaId && AREA_INFO[areaId] && AREA_INFO[areaId].dungeon;
  if (isDungeon && !e.boss && Math.random() < 0.15) {
    const chest = openTreasureChest(e.level);
    addBattleLog(`宝箱を発見！${chest}`, 'reward');
    await delay(spd);
  }

  // ボス称号
  if (e.boss && e.title && !p.titles.includes(e.title)) {
    p.titles.push(e.title);
    addBattleLog(`称号「${e.title}」を獲得！`, 'lvup');
    await delay(spd);
  }

  // ボス撃破カウント
  if (e.boss && e.defeatKey) {
    p.bossDefeats[e.defeatKey] = (p.bossDefeats[e.defeatKey] || 0) + 1;
  }

  // レベルアップ
  while (p.exp >= expForNextLevel(p.level) && p.level < MAX_LEVEL) {
    p.exp -= expForNextLevel(p.level);
    const { gains, bonuses } = processLevelUp(p);
    addBattleLog(`レベルアップ！Lv.${p.level-1} → Lv.${p.level}`, 'lvup');
    const parts = STAT_KEYS.filter(k => gains[k] > 0).map(k => {
      if (bonuses[k]) return `<span class="bonus-growth">${STAT_NAMES[k]}+${gains[k]} ★</span>`;
      return STAT_NAMES[k]+'+'+gains[k];
    });
    if (parts.length) addBattleLog(parts.join(' '), 'lvup');
    // 転職後初回レベルアップメッセージ
    if (p.postTransferLevelUp && (p.jobChangeCount || 0) > 0) {
      addBattleLog('以前の経験が体に染み付いている…前より強い気がする', 'sys');
      p.postTransferLevelUp = false;
    }
    // 新スキル習得チェック
    const job = JOBS[p.jobId];
    if (job.skills) {
      for (const js of job.skills) {
        if (js.lv === p.level) {
          addBattleLog(`${SKILLS[js.id].name}を習得した！`, 'lvup');
        }
      }
    }
    await delay(spd);
  }

  // 武器耐久値減少
  degradeWeapon(p);

  saveGame();
  // 戻るボタン表示
  const cont = document.getElementById('battle-continue');
  if (cont) cont.classList.remove('hidden');
}

async function handleDefeat(p, e) {
  addBattleLog(`${p.name}は力尽きた…`, 'danger');
  await delay(800);

  // デモバトル: ペナルティなし
  if (G.demo) {
    addBattleLog('…だが、諦めない。', 'sys');
    await delay(600);
    const cont = document.getElementById('battle-continue');
    if (cont) {
      cont.innerHTML = '<button class="btn primary" data-a="battleend">続ける</button>';
      cont.classList.remove('hidden');
    }
    return;
  }

  // ゴールドペナルティ
  const lostGold = Math.floor(p.gold * DEATH_GOLD_PENALTY);
  if (lostGold > 0) {
    p.gold -= lostGold;
    addBattleLog(`${lostGold}Gを落としてしまった…`, 'danger');
    await delay(400);
  }
  if (p.bankGold > 0) {
    addBattleLog(`銀行の預金${p.bankGold.toLocaleString()}Gは無事だ`, 'sys');
    await delay(400);
  }
  addBattleLog('最後に訪れた町で目を覚ました…', 'sys');
  p.hp = 1;
  p.location = { type:'town', id: p.lastTown || 'town1' };
  saveGame();
  const cont = document.getElementById('battle-continue');
  if (cont) {
    cont.innerHTML = '<button class="btn primary" data-a="battleend">続ける</button>';
    cont.classList.remove('hidden');
  }
}

// 宝箱
function openTreasureChest(level) {
  const r = Math.random();
  if (r < 0.5) {
    const g = level * 10 + rand(0, level * 5);
    G.player.gold += g;
    return `${g}G入っていた！`;
  } else if (r < 0.8) {
    const items = ['herb','hi_herb','magic_water','tent'];
    const id = items[rand(0, items.length-1)];
    addItemToPlayer(G.player, id, 1);
    return `${ITEMS[id].name}が入っていた！`;
  } else {
    const rare = ['mithril_ore','spirit_stone','dark_crystal'];
    const id = rare[rand(0, rare.length-1)];
    addItemToPlayer(G.player, id, 1);
    return `${ITEMS[id].name}が入っていた！`;
  }
}

// 武器耐久値減少
function degradeWeapon(p) {
  const wep = p.equipObjs.weapon;
  if (!wep || wep.maxDurability === 0) return;
  wep.durability--;
  if (wep.durability <= 0) {
    const name = EQUIPS[wep.baseId].name;
    p.equipObjs.weapon = null;
    addBattleLog(`${name}が壊れた！`, 'danger');
    addLog(`${name}が壊れた！`, 'danger');
  }
}
/* ═══════════════════════════════════════
   経済システム (ショップ・銀行・倉庫)
   ═══════════════════════════════════════ */

// --- アイテム操作 ---
function hasItem(p, id, count) {
  const slot = p.items.find(i => i.id === id);
  return slot && slot.count >= count;
}

function addItemToPlayer(p, id, count) {
  const slot = p.items.find(i => i.id === id);
  if (slot) { slot.count += count; }
  else { p.items.push({ id, count }); }
}

function removeItem(p, id, count) {
  const slot = p.items.find(i => i.id === id);
  if (!slot) return false;
  slot.count -= count;
  if (slot.count <= 0) p.items.splice(p.items.indexOf(slot), 1);
  return true;
}

// --- ショップ購入 ---
function buyShopItem(shopItemDef) {
  const p = G.player;
  if (shopItemDef.isEquip) {
    const eq = EQUIPS[shopItemDef.id];
    if (!eq) return;
    if (p.gold < eq.price) { addLog('ゴールドが足りない！', 'danger'); return; }
    p.gold -= eq.price;
    p.equipBag.push(createEquip(shopItemDef.id, 0));
    addLog(`${eq.name}を購入した！`, 'reward');
  } else {
    const item = ITEMS[shopItemDef.id];
    if (!item) return;
    if (p.gold < item.price) { addLog('ゴールドが足りない！', 'danger'); return; }
    p.gold -= item.price;
    addItemToPlayer(p, shopItemDef.id, 1);
    addLog(`${item.name}を購入した！`, 'reward');
  }
  saveGame();
  render();
}

// --- ショップ売却 ---
function sellItem(itemId, isEquip, bagIndex) {
  const p = G.player;
  if (isEquip) {
    if (bagIndex < 0 || bagIndex >= p.equipBag.length) return;
    const eo = p.equipBag[bagIndex];
    const base = EQUIPS[eo.baseId];
    const price = Math.floor(base.price * 0.5);
    p.gold += price;
    p.equipBag.splice(bagIndex, 1);
    addLog(`${equipName(eo)}を${price}Gで売却した`, 'reward');
  } else {
    const item = ITEMS[itemId];
    if (!item || !hasItem(p, itemId, 1)) return;
    const price = Math.floor(item.price * 0.5);
    p.gold += price;
    removeItem(p, itemId, 1);
    addLog(`${item.name}を${price}Gで売却した`, 'reward');
  }
  saveGame();
  render();
}

// --- 装備 ---
function equipItem(bagIndex) {
  const p = G.player;
  if (bagIndex < 0 || bagIndex >= p.equipBag.length) return;
  const eo = p.equipBag[bagIndex];
  const base = EQUIPS[eo.baseId];
  const slot = base.slot;
  // 今装備中のものをバッグに戻す
  if (p.equipObjs[slot]) {
    p.equipBag.push(p.equipObjs[slot]);
  }
  p.equipObjs[slot] = eo;
  p.equipBag.splice(bagIndex, 1);
  const st = calcStats(p);
  p.hp = Math.min(p.hp, st.maxHp);
  p.mp = Math.min(p.mp, st.maxMp);
  addLog(`${equipName(eo)}を装備した`, 'system');
  saveGame();
  render();
}

function unequipItem(slot) {
  const p = G.player;
  if (!p.equipObjs[slot]) return;
  p.equipBag.push(p.equipObjs[slot]);
  p.equipObjs[slot] = null;
  const st = calcStats(p);
  p.hp = Math.min(p.hp, st.maxHp);
  p.mp = Math.min(p.mp, st.maxMp);
  addLog('装備を外した', 'system');
  saveGame();
  render();
}

// --- 宿屋 ---
function stayAtInn(cost) {
  const p = G.player;
  if (p.gold < cost) { addLog('ゴールドが足りない！', 'danger'); render(); return; }
  p.gold -= cost;
  const st = calcStats(p);
  p.hp = st.maxHp;
  p.mp = st.maxMp;
  addLog(`宿屋に泊まった。HP・MPが全回復した！(${cost}G)`, 'heal');
  saveGame();
  render();
}

// --- アイテム使用 ---
function useItemFromInventory(itemId) {
  const p = G.player;
  const item = ITEMS[itemId];
  if (!item || !hasItem(p, itemId, 1)) return;
  if (item.type !== 'consumable') { addLog('このアイテムは使えない', 'danger'); render(); return; }

  // 転移の巻物: 特殊処理
  if (itemId === 'warp_scroll') {
    if (p.location.type !== 'field') {
      addLog('フィールドでのみ使用できる', 'danger'); render(); return;
    }
    const area = p.location.area;
    const deepest = (p.deepestLayers || {})[area] || p.location.layer;
    if (deepest <= p.location.layer) {
      addLog('これ以上先に進んだことがない', 'system'); render(); return;
    }
    removeItem(p, 'warp_scroll', 1);
    addLog(`転移の巻物を使った！階層${deepest}へ転移した！`, 'reward');
    moveTo({ type:'field', area, layer: deepest });
    const mon = spawnMonster(area, deepest);
    if (mon) { saveGame(); startBattle(mon); }
    return;
  }

  if (item.healHp === 0 && item.healMp === 0) { addLog('今は使えない', 'danger'); render(); return; }
  removeItem(p, itemId, 1);
  const st = calcStats(p);
  if (item.healHp) {
    const amt = item.healHp === -1 ? st.maxHp : item.healHp;
    p.hp = Math.min(p.hp + amt, st.maxHp);
  }
  if (item.healMp) {
    const amt = item.healMp === -1 ? st.maxMp : item.healMp;
    p.mp = Math.min(p.mp + amt, st.maxMp);
  }
  addLog(`${item.name}を使った！`, 'heal');
  saveGame();
  render();
}

// --- 銀行 ---
function bankDeposit(amount) {
  const p = G.player;
  if (amount <= 0 || p.gold < amount) return;
  const fee = Math.max(1, Math.floor(amount * 0.05));
  const total = amount + fee;
  if (p.gold < total) { addLog(`手数料込み${total}G必要（手数料${fee}G）`, 'danger'); render(); return; }
  p.gold -= total;
  p.bankGold += amount;
  addLog(`${amount}Gを預けた（手数料${fee}G）`, 'reward');
  saveGame();
  render();
}

function bankWithdraw(amount) {
  const p = G.player;
  if (amount <= 0 || p.bankGold < amount) return;
  p.bankGold -= amount;
  p.gold += amount;
  addLog(`${amount}Gを引き出した`, 'reward');
  saveGame();
  render();
}

// --- 倉庫 ---
function warehouseStore(itemId, isEquip, bagIndex) {
  const p = G.player;
  const fee = 10;
  if (p.gold < fee) { addLog('手数料10Gが必要', 'danger'); render(); return; }
  p.gold -= fee;
  if (isEquip) {
    const eo = p.equipBag.splice(bagIndex, 1)[0];
    p.warehouseEquips.push(eo);
    addLog(`${equipName(eo)}を預けた`, 'system');
  } else {
    if (!hasItem(p, itemId, 1)) return;
    removeItem(p, itemId, 1);
    const ws = p.warehouse.find(i => i.id === itemId);
    if (ws) ws.count++; else p.warehouse.push({ id:itemId, count:1 });
    addLog(`${(ITEMS[itemId]||{}).name||itemId}を預けた`, 'system');
  }
  saveGame();
  render();
}

function warehouseRetrieve(itemId, isEquip, whIndex) {
  const p = G.player;
  if (isEquip) {
    const eo = p.warehouseEquips.splice(whIndex, 1)[0];
    p.equipBag.push(eo);
    addLog(`${equipName(eo)}を引き出した`, 'system');
  } else {
    const ws = p.warehouse.find(i => i.id === itemId);
    if (!ws || ws.count <= 0) return;
    ws.count--;
    if (ws.count <= 0) p.warehouse.splice(p.warehouse.indexOf(ws), 1);
    addItemToPlayer(p, itemId, 1);
    addLog(`${(ITEMS[itemId]||{}).name||itemId}を引き出した`, 'system');
  }
  saveGame();
  render();
}

// --- ヘルパー ---
function equipName(eo) {
  const base = EQUIPS[eo.baseId];
  let n = base ? base.name : eo.baseId;
  if (eo.enhancement > 0) n += '+' + eo.enhancement;
  return n;
}

function equipStatText(eo) {
  const base = EQUIPS[eo.baseId];
  if (!base) return '';
  const parts = [];
  for (const [k,v] of Object.entries(base.s)) {
    let total = v;
    if (eo.enhancement > 0) {
      if (base.slot === 'weapon' && k === 'atk') total += eo.enhancement * ENHANCE_BONUS.weapon;
      if (base.slot === 'armor' && k === 'def') total += eo.enhancement * ENHANCE_BONUS.armor;
    }
    parts.push(STAT_NAMES[k] + '+' + total);
  }
  if (eo.grantedSkill && SKILLS[eo.grantedSkill]) {
    parts.push('★' + SKILLS[eo.grantedSkill].name);
  }
  return parts.join(' ');
}

// --- 鍛冶 (鉱山の町) ---

// 作成可能かチェック
function canSmith(recipe) {
  const p = G.player;
  if (p.gold < recipe.fee) return false;
  for (const inp of recipe.inputs) {
    if (!hasItem(p, inp.id, inp.count)) return false;
  }
  return true;
}

// 鍛冶実行
function doSmith(recipeIndex) {
  const recipe = SMITH_RECIPES[recipeIndex];
  if (!recipe || !canSmith(recipe)) { addLog('素材かゴールドが足りない', 'danger'); render(); return; }
  const p = G.player;
  // 素材・手数料消費
  p.gold -= recipe.fee;
  for (const inp of recipe.inputs) {
    removeItem(p, inp.id, inp.count);
  }
  // 成否判定
  if (Math.random() < recipe.rate) {
    const eq = createEquip(recipe.output, 0);
    const base = EQUIPS[recipe.output];
    // 稀に貴重スキルが付与される
    const slotType = base.slot;
    const rarePool = SMITH_RARE_SKILLS[slotType];
    if (rarePool && Math.random() < SMITH_RARE_SKILL_CHANCE) {
      const totalW = rarePool.reduce((s, e) => s + e.weight, 0);
      let r = Math.random() * totalW;
      let picked = rarePool[0].id;
      for (const entry of rarePool) {
        r -= entry.weight;
        if (r <= 0) { picked = entry.id; break; }
      }
      eq.grantedSkill = picked;
      addLog(`鍛冶成功！${base.name}を作成した！`, 'reward');
      addLog(`★ 貴重なスキル「${SKILLS[picked].name}」が宿った！`, 'lvup');
    } else {
      addLog(`鍛冶成功！${base.name}を作成した！`, 'reward');
    }
    p.equipBag.push(eq);
  } else {
    addLog('鍛冶失敗…素材は失われた。', 'danger');
  }
  saveGame();
  render();
}

// --- 修理 (鍛冶屋) ---
function canRepair(eo) {
  if (!eo || eo.maxDurability === 0) return false;
  return eo.durability < eo.maxDurability;
}

function getRepairCost(eo) {
  const base = EQUIPS[eo.baseId];
  return Math.max(5, Math.floor(base.price * 0.2));
}

function doRepair(slot) {
  const p = G.player;
  const eo = (slot === 'bag') ? null : p.equipObjs[slot];
  // bagから修理する場合は別途処理
  if (!eo || !canRepair(eo)) { addLog('修理の必要がない', 'system'); render(); return; }
  const cost = getRepairCost(eo);
  if (p.gold < cost) { addLog('ゴールドが足りない', 'danger'); render(); return; }
  p.gold -= cost;
  // 最大耐久値を5%減少 (修理のたびに劣化)
  eo.maxDurability = Math.max(1, Math.floor(eo.maxDurability * 0.95));
  eo.durability = eo.maxDurability;
  addLog(`${equipName(eo)}を修理した（${cost}G, 最大耐久${eo.maxDurability}）`, 'system');
  saveGame();
  render();
}

function doRepairBag(bagIndex) {
  const p = G.player;
  const eo = p.equipBag[bagIndex];
  if (!eo || !canRepair(eo)) { addLog('修理の必要がない', 'system'); render(); return; }
  const cost = getRepairCost(eo);
  if (p.gold < cost) { addLog('ゴールドが足りない', 'danger'); render(); return; }
  p.gold -= cost;
  eo.maxDurability = Math.max(1, Math.floor(eo.maxDurability * 0.95));
  eo.durability = eo.maxDurability;
  addLog(`${equipName(eo)}を修理した（${cost}G, 最大耐久${eo.maxDurability}）`, 'system');
  saveGame();
  render();
}

// --- 合成 (エルフの里) ---
function canSynth(recipe) {
  const p = G.player;
  // 同素材の重複を正しくカウント
  const counts = {};
  for (const id of recipe.inputs) counts[id] = (counts[id] || 0) + 1;
  for (const id of Object.keys(counts)) {
    if (!hasItem(p, id, counts[id])) return false;
  }
  return true;
}

function doSynth(recipeIndex) {
  const recipe = SYNTH_RECIPES[recipeIndex];
  if (!recipe || !canSynth(recipe)) { addLog('素材が足りない', 'danger'); render(); return; }
  const p = G.player;
  // 素材消費 (失敗時も消費)
  for (const id of recipe.inputs) {
    removeItem(p, id, 1);
  }
  if (Math.random() < recipe.rate) {
    if (recipe.output.isEquip) {
      p.equipBag.push(createEquip(recipe.output.id, 0));
      addLog(`合成成功！${EQUIPS[recipe.output.id].name}を作成した！`, 'reward');
    } else {
      addItemToPlayer(p, recipe.output.id, recipe.outputCount || 1);
      addLog(`合成成功！${ITEMS[recipe.output.id].name}を作成した！`, 'reward');
    }
  } else {
    addLog('合成失敗…素材は失われた。', 'danger');
  }
  saveGame();
  render();
}

// --- 強化 (エルフの里) ---
function getEnhanceCost(eo) {
  const base = EQUIPS[eo.baseId];
  return Math.floor(base.price * (eo.enhancement + 1) * 0.3);
}

function getEnhanceRate(eo) {
  if (eo.enhancement >= MAX_ENHANCE) return 0;
  return ENHANCE_RATES[eo.enhancement] || 0;
}

// 強化対象: 装備中 or バッグから (weapon/armor のみ)
function canEnhance(eo) {
  if (!eo) return false;
  const base = EQUIPS[eo.baseId];
  if (!base) return false;
  if (base.slot !== 'weapon' && base.slot !== 'armor') return false;
  if (eo.enhancement >= MAX_ENHANCE) return false;
  return true;
}

function doEnhance(source, index) {
  // source: 'equipped_weapon', 'equipped_armor', 'bag'
  const p = G.player;
  let eo, slot, bagIdx;

  if (source === 'equipped_weapon') {
    eo = p.equipObjs.weapon; slot = 'weapon';
  } else if (source === 'equipped_armor') {
    eo = p.equipObjs.armor; slot = 'armor';
  } else {
    bagIdx = index;
    eo = p.equipBag[bagIdx];
  }

  if (!eo || !canEnhance(eo)) { addLog('この装備は強化できない', 'danger'); render(); return; }
  const cost = getEnhanceCost(eo);
  if (p.gold < cost) { addLog('ゴールドが足りない', 'danger'); render(); return; }

  const rate = getEnhanceRate(eo);
  const name = equipName(eo);
  p.gold -= cost;

  if (Math.random() < rate) {
    eo.enhancement++;
    addLog(`強化成功！${name} → ${equipName(eo)}！`, 'reward');
  } else {
    // 失敗: 装備破壊
    if (slot) {
      p.equipObjs[slot] = null;
    } else {
      p.equipBag.splice(bagIdx, 1);
    }
    addLog(`強化失敗…${name}は壊れてしまった！`, 'danger');
  }
  const st = calcStats(p);
  p.hp = Math.min(p.hp, st.maxHp);
  p.mp = Math.min(p.mp, st.maxMp);
  saveGame();
  render();
}
/* ═══════════════════════════════════════
   ナビゲーション・移動
   ═══════════════════════════════════════ */

function moveTo(loc) {
  const p = G.player;
  p.location = loc;
  if (loc.type === 'town') {
    p.lastTown = loc.id;
    G.screen = 'town';
    saveGame();
  } else {
    G.screen = 'field';
    // 最深到達階層を記録
    if (!p.deepestLayers) p.deepestLayers = {};
    if ((p.deepestLayers[loc.area] || 0) < loc.layer) {
      p.deepestLayers[loc.area] = loc.layer;
    }
  }
  render();
}

function explore() {
  const p = G.player;
  if (p.location.type !== 'field') return;
  const { area, layer } = p.location;

  // 初回強制エンカウント: 格上モンスター
  if (p.firstBattle) {
    p.firstBattle = false;
    const strongMon = spawnMonster('grassland', 8);
    if (strongMon) {
      strongMon.name = '凶暴な' + strongMon.name;
      addLog('！？ 強い敵が現れた！', 'danger');
      saveGame();
      startBattle(strongMon);
      return;
    }
  }

  const monster = spawnMonster(area, layer);
  if (!monster) { addLog('モンスターは現れなかった', 'system'); return; }
  saveGame(); // 戦闘前にセーブ
  startBattle(monster);
}

function enterArena() {
  const p = G.player;
  if (p.gold < ARENA_ENTRY_FEE) { addLog('参加費100Gが必要', 'danger'); render(); return; }
  const opp = createArenaOpponent(p.arenaProgress);
  if (!opp) { addLog('闘技場の全対戦者に勝利済み', 'system'); render(); return; }
  p.gold -= ARENA_ENTRY_FEE;
  opp.arena = true;
  // 闘技場戦闘開始
  startBattle(opp);
}

// 闘技場戦闘後の処理 (combat.jsのhandleVictory/Defeatで呼ばれる想定)
// → handleVictory 内で arena フラグを確認して処理
// 上書きではなく、handleVictory 内で arena チェックを行う

function locationName(loc) {
  if (!loc) return '';
  if (loc.type === 'town') return TOWN_INFO[loc.id] ? TOWN_INFO[loc.id].name : loc.id;
  if (loc.type === 'field') {
    const info = AREA_INFO[loc.area];
    return (info ? info.name : loc.area) + ' 階層' + loc.layer;
  }
  return '';
}
/* ═══════════════════════════════════════
   セーブ・ロード
   ═══════════════════════════════════════ */

function saveGame() {
  try {
    const data = {
      version: 1,
      player: G.player,
      settings: G.settings,
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
  } catch (e) {
    console.warn('Save failed:', e);
  }
}

function loadGame() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data.player) return false;
    G.player = data.player;
    G.settings = data.settings || G.settings;
    // マイグレーション: 古いセーブデータの互換性
    if (!G.player.equipObjs) G.player.equipObjs = { weapon:null, armor:null, accessory:null };
    if (!G.player.equipBag) G.player.equipBag = [];
    if (!G.player.warehouse) G.player.warehouse = [];
    if (!G.player.warehouseEquips) G.player.warehouseEquips = [];
    if (!G.player.bossDefeats) G.player.bossDefeats = {};
    if (!G.player.jobHistory) G.player.jobHistory = [];
    if (!G.player.titles) G.player.titles = [];
    if (G.player.bankGold === undefined) G.player.bankGold = 0;
    return true;
  } catch (e) {
    console.warn('Load failed:', e);
    return false;
  }
}

function deleteSave() {
  localStorage.removeItem(SAVE_KEY);
}

function hasSave() {
  return !!localStorage.getItem(SAVE_KEY);
}

function renderHeader() {
  if (!G.player) return '<div class="hdr-top"><span class="hdr-name">Loveless Chronicle</span></div>';
  const p = G.player;
  const st = calcStats(p);
  const job = JOBS[p.jobId];
  const hpPct = Math.max(0, p.hp / st.maxHp * 100);
  const mpPct = Math.max(0, p.mp / st.maxMp * 100);
  const expPct = p.level >= MAX_LEVEL ? 100 : (p.exp / expForNextLevel(p.level) * 100);

  return `
    <div class="hdr-top">
      <span><span class="hdr-name">${esc(p.name)}</span> <span class="hdr-job">Lv.${p.level} ${job.name}</span></span>
      <span class="hdr-gold">${p.gold.toLocaleString()}G</span>
    </div>
    <div class="hdr-bars">
      <div class="bar-wrap">
        <span class="bar-label hp">HP</span>
        <div class="bar-track"><div class="bar-fill hp" style="width:${hpPct}%"></div></div>
        <span class="bar-num">${p.hp}/${st.maxHp}</span>
      </div>
      <div class="bar-wrap">
        <span class="bar-label mp">MP</span>
        <div class="bar-track"><div class="bar-fill mp" style="width:${mpPct}%"></div></div>
        <span class="bar-num">${p.mp}/${st.maxMp}</span>
      </div>
    </div>
    <div style="margin-top:2px">
      <div class="bar-wrap">
        <span class="bar-label" style="color:var(--accent);width:28px">EXP</span>
        <div class="bar-track"><div class="bar-fill exp" style="width:${expPct}%"></div></div>
        <span class="bar-num">${p.level>=MAX_LEVEL?'MAX':p.exp+'/'+expForNextLevel(p.level)}</span>
      </div>
    </div>
    <div class="hdr-loc">${locationName(p.location)}</div>`;
}

function renderLog() {
  if (G.log.length === 0) return '';
  return G.log.slice(-15).map(e => `<div class="log-entry ${e.cls}">${e.msg}</div>`).join('');
}

// HP バー (ミニ)
function miniBar(current, max, cls) {
  const pct = Math.max(0, current / max * 100);
  return `<div class="bar-track" style="height:6px"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
}

// 耐久値表示
function durabilityText(eo) {
  if (!eo || eo.maxDurability === 0) return '';
  const ratio = eo.durability / eo.maxDurability;
  const cls = ratio > 0.5 ? 'dur-ok' : ratio > 0.2 ? 'dur-warn' : 'dur-danger';
  return `<span class="durability ${cls}">[耐久 ${eo.durability}/${eo.maxDurability}]</span>`;
}

// 成功率表示
function rateText(rate) {
  const pct = Math.floor(rate * 100);
  const cls = pct >= 70 ? 'rate-high' : pct >= 40 ? 'rate-mid' : 'rate-low';
  return `<span class="${cls}">${pct}%</span>`;
}

// エスケープ
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// 戻るボタン
function backBtn(label) {
  label = label || '戻る';
  return `<button class="btn small" data-a="back">&larr; ${label}</button>`;
}

// --- ショップ画面 ---
function screenShop() {
  const shop = SHOPS[G.shopId];
  if (!shop) return backBtn() + '<p>ショップが見つからない</p>';
  const p = G.player;

  let itemsHtml = '';
  if (G.shopTab === 'buy') {
    itemsHtml = shop.items.map((si, i) => {
      const info = si.isEquip ? EQUIPS[si.id] : ITEMS[si.id];
      if (!info) return '';
      const price = info.price;
      const canBuy = p.gold >= price;
      let detail = si.isEquip ? equipStatSummary(si.id) : info.desc;
      // 装備比較
      if (si.isEquip) {
        const eq = EQUIPS[si.id];
        const slot = eq.slot;
        const current = p.equipObjs[slot];
        if (current) {
          const curEq = EQUIPS[current.baseId];
          const diffs = STAT_KEYS.map(k => {
            const diff = (eq.s[k]||0) - (curEq.s[k]||0);
            if (diff === 0) return null;
            return diff > 0 ? `<span class="text-success">${STAT_NAMES[k]}+${diff}</span>` : `<span class="text-danger">${STAT_NAMES[k]}${diff}</span>`;
          }).filter(Boolean);
          if (diffs.length) detail += '<br>現装備比較: ' + diffs.join(' ');
        }
      }
      return `<div class="shop-item">
        <div class="info"><div class="name">${info.name}</div><div class="detail">${detail}</div></div>
        <div class="price">${price}G</div>
        <button class="btn small${canBuy?'':' disabled'}" data-a="buy" data-p="${i}" ${canBuy?'':'disabled'}>購入</button>
      </div>`;
    }).join('');
  } else {
    // 売却: アイテム
    const sellItems = p.items.filter(it => (ITEMS[it.id] || {}).price > 0).map(it => {
      const info = ITEMS[it.id];
      return `<div class="shop-item">
        <div class="info"><div class="name">${info.name} x${it.count}</div></div>
        <div class="price">${Math.floor(info.price*0.5)}G</div>
        <button class="btn small" data-a="sell" data-p="${it.id}" data-p2="item">売却</button>
      </div>`;
    }).join('');
    const sellEquips = p.equipBag.map((eo, i) => {
      const base = EQUIPS[eo.baseId];
      return `<div class="shop-item">
        <div class="info"><div class="name">${equipName(eo)}</div><div class="detail">${equipStatText(eo)}</div></div>
        <div class="price">${Math.floor(base.price*0.5)}G</div>
        <button class="btn small" data-a="sell" data-p="${i}" data-p2="equip">売却</button>
      </div>`;
    }).join('');
    itemsHtml = sellItems + sellEquips;
    if (!itemsHtml) itemsHtml = '<p class="text-muted text-center">売れるものがない</p>';
  }

  return `
    ${backBtn()}
    <h2>${shop.name}</h2>
    <div class="tabs">
      <div class="tab ${G.shopTab==='buy'?'active':''}" data-a="shoptab" data-p="buy">購入</div>
      <div class="tab ${G.shopTab==='sell'?'active':''}" data-a="shoptab" data-p="sell">売却</div>
    </div>
    <div class="panel">${itemsHtml}</div>`;
}

function equipStatSummary(eqId) {
  const eq = EQUIPS[eqId];
  if (!eq) return '';
  const parts = Object.entries(eq.s).map(([k,v]) => STAT_NAMES[k]+'+'+v);
  if (eq.dur > 0) parts.push('耐久'+eq.dur);
  return parts.join(' ');
}

  let content = '';
  if (tab === 'stats') {
    content = `
      <table class="stat-table">
        ${STAT_KEYS.filter(k=>k!=='hp'&&k!=='mp').map(k =>
          `<tr><td class="label">${STAT_NAMES[k]}</td><td class="val">${st[k]}</td></tr>`
        ).join('')}

      <div class="mt-1 text-muted" style="font-size:0.8rem">

        転職回数: ${p.jobChangeCount || 0}回<br>
        称号: ${p.titles.join(', ')||'なし'}
      </div>`;
  } else if (tab === 'equip') {
    content = ['weapon','armor','accessory'].map(slot => {
      const eo = p.equipObjs[slot];
      const slotName = {weapon:'武器',armor:'防具',accessory:'アクセサリー'}[slot];
      if (!eo) return `<div class="equip-slot"><span class="slot-label">${slotName}</span><span class="slot-empty">なし</span></div>`;
      return `<div class="equip-slot">
        <span class="slot-label">${slotName}</span>
        <span class="slot-item">${equipName(eo)} ${durabilityText(eo)}<br><span class="text-muted" style="font-size:0.75rem">${equipStatText(eo)}</span></span>
        <button class="btn small" data-a="unequip" data-p="${slot}">外す</button>
      </div>`;
    }).join('') +
    '<div class="sep"></div><h3>装備バッグ</h3>' +
    (p.equipBag.length === 0 ? '<p class="text-muted">なし</p>' :
      p.equipBag.map((eo,i) => {
        const base = EQUIPS[eo.baseId];
        return `<div class="shop-item">
          <div class="info"><div class="name">${equipName(eo)} ${durabilityText(eo)}</div><div class="detail">${equipStatText(eo)}</div></div>
          <button class="btn small" data-a="equip" data-p="${i}">装備</button>
        </div>`;
      }).join(''));
  } else if (tab === 'items') {
    content = p.items.length === 0 ? '<p class="text-muted">アイテムなし</p>' :
      p.items.map(it => {
        const info = ITEMS[it.id];
        if (!info) return '';
        const canUse = info.type === 'consumable' && (info.healHp || info.healMp || it.id === 'warp_scroll');
        let desc = info.desc;
        if (it.id === 'warp_scroll' && p.location.type === 'field') {
          const deepest = (p.deepestLayers || {})[p.location.area] || p.location.layer;
          desc += ` (現在エリア最深: 階層${deepest})`;
        }
        return `<div class="shop-item">
          <div class="info"><div class="name">${info.name} x${it.count}</div><div class="detail">${desc}</div></div>
          ${canUse ? `<button class="btn small" data-a="useitem" data-p="${it.id}">使う</button>` : ''}
        </div>`;
      }).join('');
  } else if (tab === 'skills') {
    const skills = getAvailableSkills(p);
    content = skills.length === 0 ? '<p class="text-muted">スキルなし</p>' :
      skills.map(id => {
        const sk = SKILLS[id];
        if (!sk) return '';
        return `<div class="shop-item">
          <div class="info"><div class="name">${sk.name}</div><div class="detail">${sk.desc} | MP${sk.cost||0}</div></div>
        </div>`;
      }).join('');
  }

  // 作戦選択
  const stratHtml = STRATEGIES.map(s =>
    `<button class="btn small ${G.settings.strategy===s.id?'primary':''}" data-a="strategy" data-p="${s.id}">${s.name}</button>`
  ).join('');

  return `
    ${backBtn()}
    <h2>ステータス</h2>
    <div class="tabs">
      <div class="tab ${tab==='stats'?'active':''}" data-a="statustab" data-p="stats">能力</div>
      <div class="tab ${tab==='equip'?'active':''}" data-a="statustab" data-p="equip">装備</div>
      <div class="tab ${tab==='items'?'active':''}" data-a="statustab" data-p="items">持ち物</div>
      <div class="tab ${tab==='skills'?'active':''}" data-a="statustab" data-p="skills">スキル</div>
    </div>
    <div class="panel">${content}</div>
    <div class="sep"></div>
    <h3>作戦</h3>
    <div class="btn-row">${stratHtml}</div>`;
}

function setupEvents() {
  document.getElementById('main').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-a]');
    if (!btn) return;
    const action = btn.dataset.a;
    const p1 = btn.dataset.p;
    const p2 = btn.dataset.p2;
    handleAction(action, p1, p2);
  });
}

function handleAction(action, p1, p2) {
  const p = G.player;
  switch (action) {
    // --- タイトル ---
    case 'newgame': {
      // デモバトル開始: Lv30騎士 vs ドラゴン
      G.demo = true;
      G.player = createDemoPlayer();
      const demoEnemy = { ...BOSSES['mine_30'] };
      selectedJob = null;
      startBattle(demoEnemy);
      break;
    }
    case 'continue':
      if (loadGame()) {
        G.screen = p ? (G.player.location.type === 'town' ? 'town' : 'field') : 'title';
        if (G.player && G.player.location.type === 'town') G.screen = 'town';
        else if (G.player) G.screen = 'field';
        render();
      }
      break;

    // --- 名前・職業選択 ---
    case 'selectjob': {
      selectedJob = p1;
      document.querySelectorAll('.job-card').forEach(el => el.classList.remove('selected'));
      const jc = document.getElementById('jc-' + p1);
      if (jc) jc.classList.add('selected');
      const startBtn = document.getElementById('btn-start');
      if (startBtn) startBtn.disabled = false;
      break;
    }
    case 'startgame': {
      const nameInput = document.getElementById('name-input');
      const name = nameInput ? nameInput.value.trim() : '勇者';
      if (!name || !selectedJob) break;
      const preset = DEBUG_PRESETS[name];
      if (preset) {
        // デバッグキャラ: プリセットのステータスで開始
        G.player = newPlayer(name, preset.jobId);
        G.player.level = 30;
        G.player.baseStats = { ...preset.baseStats };
        G.player.growthStats = { ...preset.growthStats };
        G.player.equipObjs.weapon = createEquip(preset.weapon, preset.weaponEnhance || 0);
        G.player.equipObjs.armor = createEquip(preset.armor, preset.armorEnhance || 0);
        if (preset.accessory) G.player.equipObjs.accessory = createEquip(preset.accessory, 0);
        addItemToPlayer(G.player, 'tent', 99);
        addItemToPlayer(G.player, 'elixir', 10);
        addItemToPlayer(G.player, 'hi_herb', 10);
        G.player.gold = 99999;
        G.player.location = { ...preset.location };
        G.player.lastTown = preset.lastTown;
        if (preset.bossDefeats) G.player.bossDefeats = { ...preset.bossDefeats };
        // 上級職スキルをすべて習得済み扱い (Lv30)
        if (!G.player.jobHistory.includes(selectedJob)) G.player.jobHistory.push(selectedJob);
        const st = calcStats(G.player);
        G.player.hp = st.maxHp;
        G.player.mp = st.maxMp;
        addLog('デバッグキャラ「' + name + '」で冒険開始！', 'lvup');
        saveGame();
        setScreen(G.player.location.type === 'town' ? 'town' : 'field');
      } else {
        // 通常のゲーム開始
        G.player = newPlayer(name, selectedJob);
        G.player.equipObjs.weapon = createEquip('wooden_stick', 0);
        G.player.equipObjs.armor = createEquip('cloth', 0);
        addItemToPlayer(G.player, 'herb', 3);
        const st = calcStats(G.player);
        G.player.hp = st.maxHp;
        G.player.mp = st.maxMp;
        addLog('冒険が始まった！', 'system');
        saveGame();
        setScreen('town');
      }
      break;
    }

    // --- 町施設 ---
    case 'facility':
      handleFacility(p1, p2);
      break;

    // --- 移動 ---
    case 'movetown':
      moveTo({ type:'town', id:p1 });
      break;
    case 'movefield': {
      const destArea = p1;
      const destLayer = parseInt(p2);
      moveTo({ type:'field', area:destArea, layer:destLayer });
      const mon = spawnMonster(destArea, destLayer);
      if (mon) { saveGame(); startBattle(mon); }
      break;
    }

    // --- フィールド ---
    case 'explore':
      G.battle = null;
      explore();
      break;
    case 'screen':
      pushScreen(p1);
      break;

    // --- 戦闘 ---
    case 'battlespeed':
      G.settings.battleSpeed = G.settings.battleSpeed <= 200 ? 600 : 200;
      render();
      break;
    case 'demo_continue':
      // デモバトル→名前入力画面へ
      G.demo = false;
      G.player = null;
      G.battle = null;
      G.screen = 'naming';
      selectedJob = null;
      render();
      break;
    case 'battleend':
      // デモバトル終了→遷移画面
      if (G.demo) {
        G.battle = null;
        G.screen = 'demo_transition';
        render();
        break;
      }
      // 闘技場の結果処理
      if (G.battle && G.battle.enemy && G.battle.enemy.arena) {
        if (G.battle.won) {
          const prize = G.battle.enemy.level * 20;
          G.player.gold += prize;
          G.player.arenaProgress++;
          addLog(`闘技場勝利！賞金${prize}Gを獲得！`, 'reward');
          if (G.player.arenaProgress >= ARENA_OPPONENTS.length && G.player.arenaUndefeated) {
            if (!G.player.titles.includes('闘技場の覇者')) {
              G.player.titles.push('闘技場の覇者');
              addLog('称号「闘技場の覇者」を獲得！', 'lvup');
            }
          }
        } else {
          G.player.arenaProgress = 0;
          G.player.arenaUndefeated = false;
        }
        saveGame();
      }
      G.battle = null;
      if (G.player.location.type === 'town') setScreen('town');
      else setScreen('field');
      break;
    case 'battleend-status':
      G.battle = null;
      G.screen = G.player.location.type === 'town' ? 'town' : 'field';
      G.screenStack = [];
      pushScreen('status');
      break;
    case 'battleend-movetown':
      G.battle = null;
      moveTo({ type:'town', id:p1 });
      break;
    case 'battleend-movefield': {
      G.battle = null;
      const destArea2 = p1;
      const destLayer2 = parseInt(p2);
      moveTo({ type:'field', area:destArea2, layer:destLayer2 });
      const mon2 = spawnMonster(destArea2, destLayer2);
      if (mon2) { saveGame(); startBattle(mon2); }
      break;
    }

    // --- ショップ ---
    case 'shoptab':
      G.shopTab = p1;
      render();
      break;
    case 'buy': {
      const shop = SHOPS[G.shopId];
      if (shop) buyShopItem(shop.items[parseInt(p1)]);
      break;
    }
    case 'sell':
      if (p2 === 'equip') sellItem(null, true, parseInt(p1));
      else sellItem(p1, false, 0);
      break;

    // --- 装備 ---
    case 'equip':
      equipItem(parseInt(p1));
      break;
    case 'unequip':
      unequipItem(p1);
      break;

    // --- アイテム使用 ---
    case 'useitem':
      useItemFromInventory(p1);
      break;

    // --- ステータスタブ ---
    case 'statustab':
      G.statusTab = p1;
      render();
      break;

    // --- 作戦 ---
    case 'strategy':
      G.settings.strategy = p1;
      saveGame();
      render();
      break;

    // --- 宿屋 ---
    case 'doinn':
      stayAtInn(parseInt(p1));
      break;

    // --- 転職 ---
    case 'dojobchange':
      if (p1 === G.player.jobId) { addLog('現在の職業と同じです', 'system'); render(); break; }
      if (G.jobChangeAdvanced && G.player.level < 15) { addLog('Lv.15以上必要です', 'danger'); render(); break; }
      if (G.jobChangeAdvanced && JOBS[G.player.jobId].type === 'advanced') { addLog('上級職からは転職できません。下級職に戻してから転職してください。', 'danger'); render(); break; }
      {
        const isAdv = JOBS[p1].type === 'advanced';
        const prevSt = isAdv ? calcStats(G.player) : null;
        changeJob(G.player, p1);
        addLog(`${JOBS[p1].name}に転職した！`, 'lvup');
        if (isAdv && prevSt) {
          const newSt = calcStats(G.player);
          const boosts = STAT_KEYS
            .filter(k => {
              const prev = k === 'hp' ? prevSt.maxHp : k === 'mp' ? prevSt.maxMp : prevSt[k];
              const now = k === 'hp' ? newSt.maxHp : k === 'mp' ? newSt.maxMp : newSt[k];
              return now > prev;
            })
            .map(k => {
              const prev = k === 'hp' ? prevSt.maxHp : k === 'mp' ? prevSt.maxMp : prevSt[k];
              const now = k === 'hp' ? newSt.maxHp : k === 'mp' ? newSt.maxMp : newSt[k];
              return STAT_NAMES[k] + '+' + (now - prev);
            });
          if (boosts.length) addLog(`ステータスアップ！ ${boosts.join(' ')}`, 'lvup');
        }
      }
      saveGame();
      render();
      break;

    // --- 闘技場 ---
    case 'doarena':
      enterArena();
      break;

    // --- 銀行 ---
    case 'bankdeposit':
      bankDeposit(parseInt(p1));
      break;
    case 'bankwithdraw':
      bankWithdraw(parseInt(p1));
      break;

    // --- 倉庫 ---
    case 'whstore':
      if (p2 === 'equip') warehouseStore(null, true, parseInt(p1));
      else warehouseStore(p1, false, 0);
      break;
    case 'whretrieve':
      if (p2 === 'equip') warehouseRetrieve(null, true, parseInt(p1));
      else warehouseRetrieve(p1, false, 0);
      break;

    // --- 鍛冶 ---
    case 'dosmith':
      doSmith(parseInt(p1));
      break;
    case 'dorepair':
      doRepair(p1);
      break;
    case 'dorepairbag':
      doRepairBag(parseInt(p1));
      break;

    // --- 合成 ---
    case 'dosynth':
      doSynth(parseInt(p1));
      break;

    // --- 強化 ---
    case 'doenhance':
      doEnhance(p1, parseInt(p2));
      break;

    // --- 戻る ---
    case 'back':
      popScreen();
      break;
  }
}

function handleFacility(facilityId, param) {
  switch (facilityId) {
    case 'inn':
      G.innCost = parseInt(param) || 10;
      pushScreen('inn');
      break;
    case 'shop':
      G.shopId = param;
      G.shopTab = 'buy';
      pushScreen('shop');
      break;
    case 'jobchange':
      G.jobChangeAdvanced = (param === 'true');
      pushScreen('jobchange');
      break;
    case 'arena':
      pushScreen('arena');
      break;
    case 'bank':
      pushScreen('bank');
      break;
    case 'warehouse':
      pushScreen('warehouse');
      break;
    case 'blacksmith':
      pushScreen('blacksmith');
      break;
    case 'synthesis':
      pushScreen('synthesis');
      break;
    case 'enhancement':
      pushScreen('enhancement');
      break;
    case 'guild':
      pushScreen('guild');
      break;
    case 'status':
      pushScreen('status');
      break;
    case 'social_arena':
    case 'social_tavern':
      addLog('この機能は今後のアップデートで追加予定です', 'system');
      render();
      break;
  }
}
/* ═══════════════════════════════════════
   レンダリングエンジン
   ═══════════════════════════════════════ */

function render() {
  document.getElementById('hdr').innerHTML = renderHeader();
  document.getElementById('main').innerHTML = renderScreen();
  document.getElementById('log').innerHTML = renderLog();
  // ログ自動スクロール
  const logEl = document.getElementById('log');
  if (logEl) logEl.scrollTop = logEl.scrollHeight;
}

function renderScreen() {
  switch (G.screen) {
    case 'title':       return screenTitle();
    case 'naming':      return screenNaming();
    case 'town':        return screenTown();
    case 'field':       return screenField();
    case 'battle':      return screenBattle();
    case 'shop':        return screenShop();
    case 'status':      return screenStatus();
    case 'jobchange':   return screenJobChange();
    case 'inn':         return screenInn();
    case 'arena':       return screenArena();
    case 'bank':        return screenBank();
    case 'warehouse':   return screenWarehouse();
    case 'blacksmith':  return screenBlacksmith();
    case 'synthesis':   return screenSynthesis();
    case 'enhancement': return screenEnhancement();
    case 'guild':       return screenGuild();
    case 'demo_transition': return screenDemoTransition();
    default:            return '<p class="text-center text-muted">画面が見つかりません</p>';
  }
}
/* ═══════════════════════════════════════
   プラグインシステム (ソーシャル機能拡張用)
   ═══════════════════════════════════════ */
const PluginAPI = {
  plugins: [],
  register(plugin) {
    this.plugins.push(plugin);
    if (plugin.init) plugin.init();
    console.log(`[Plugin] ${plugin.name} registered`);
  },
  getExtraFacilities(townId) {
    return this.plugins.flatMap(p =>
      (p.facilities && p.facilities[townId]) || []
    );
  },
  renderScreen(screenId) {
    for (const p of this.plugins) {
      if (p.screens && p.screens[screenId]) return p.screens[screenId]();
    }
    return null;
  },
};
